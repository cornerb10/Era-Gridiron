<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17-0 — Can Your All-Time NFL Roster Go Undefeated?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05070a; --bg2:#0b0e13; --primary:#f2c230; --accent:#e2432b;
  --chalk:#f5f1e8; --line:rgba(245,241,232,0.12); --card:#0f131a; --cardBorder:rgba(242,194,48,0.2);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  background:radial-gradient(ellipse at top, #10151d 0%, var(--bg) 60%);
  color:var(--chalk); font-family:'Barlow Condensed', sans-serif; min-height:100vh;
}
h1,h2,h3,.display{font-family:'Anton', sans-serif; letter-spacing:0.5px;}
.mono{font-family:'JetBrains Mono', monospace;}
#app{max-width:920px; margin:0 auto; padding:18px 16px 60px;}
.scorebug{display:flex; align-items:center; justify-content:space-between; border:2px solid var(--primary); border-radius:6px; background:rgba(0,0,0,0.4); padding:10px 18px; margin-bottom:20px;}
.scorebug .brand{display:flex; align-items:center; gap:10px;}
.scorebug .dot{width:10px;height:10px;border-radius:50%;background:var(--accent); box-shadow:0 0 8px var(--accent);}
.scorebug h1{font-size:26px;}
.scorebug .tag{font-size:12px; color:var(--primary); text-transform:uppercase; letter-spacing:2px;}
nav.tabs{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;}
.tabs button{background:transparent; border:1px solid var(--line); color:var(--chalk); padding:7px 14px; border-radius:4px; font-family:'Barlow Condensed'; font-size:14px; text-transform:uppercase; letter-spacing:1px; cursor:pointer;}
.tabs button:hover{border-color:var(--primary); color:var(--primary);}
.card{background:var(--card); border:1px solid var(--cardBorder); border-radius:8px; padding:18px 20px; margin-bottom:14px;}
.center{text-align:center;}
.small{font-size:13px; color:#b9b3a2;}
.btn{background:var(--primary); color:#171308; border:none; padding:12px 26px; font-family:'Barlow Condensed'; font-weight:700; font-size:16px; text-transform:uppercase; letter-spacing:1px; border-radius:5px; cursor:pointer;}
.btn.secondary{background:transparent; color:var(--chalk); border:1px solid var(--line);}
.btn.secondary:hover{border-color:var(--primary); color:var(--primary);}
.btn:disabled{opacity:0.4; cursor:not-allowed;}
.yardline{border:none; border-top:1px dashed var(--line); margin:20px 0;}

/* reel spinner */
.reelRow{display:flex; gap:22px; justify-content:center; flex-wrap:wrap; margin:14px 0 6px;}
.reelWrap{display:flex; flex-direction:column; align-items:center; gap:8px; flex:1; min-width:220px; max-width:280px;}
.reelLabel{font-size:12px; text-transform:uppercase; letter-spacing:2px; color:var(--primary);}
.reelStage{position:relative; width:100%; height:132px; overflow:hidden; border-radius:8px; background:#000; border:1px solid var(--line);}
.reelStrip{position:absolute; left:0; top:0; width:100%; transition:transform 2.65s cubic-bezier(0.15,0.9,0.15,1);}
.reelStrip.instant{transition:none;}
.reelItem{height:44px; display:flex; align-items:center; gap:8px; padding:0 14px; font-size:16px; color:#7a7568;}
.reelItem .sw{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.reelHighlight{position:absolute; top:44px; left:0; width:100%; height:44px; border-top:1px solid var(--primary); border-bottom:1px solid var(--primary); background:rgba(242,194,48,0.08); pointer-events:none; z-index:2;}
.reelFade{position:absolute; left:0; width:100%; height:44px; pointer-events:none; z-index:3;}
.reelFade.top{top:0; background:linear-gradient(180deg, #000 0%, transparent 100%);}
.reelFade.bottom{bottom:0; background:linear-gradient(0deg, #000 0%, transparent 100%);}
.resultPill{display:inline-flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--primary); border-radius:20px; padding:6px 16px; font-size:15px;}
.resultPill .sw{width:9px; height:9px; border-radius:50%;}
.respinBtn{background:transparent; border:1px solid var(--line); color:#b9b3a2; font-size:11px; text-transform:uppercase; letter-spacing:1px; padding:5px 10px; border-radius:14px; cursor:pointer;}
.respinBtn:hover:not(:disabled){border-color:var(--primary); color:var(--primary);}
.respinBtn:disabled{opacity:0.3; cursor:not-allowed;}
.spinMainBtn{font-size:20px; padding:16px 44px;}

.posPill{display:inline-block; background:#1a1f14; color:var(--chalk); padding:4px 12px; border-radius:20px; font-size:13px; letter-spacing:1px; text-transform:uppercase; border:1px solid var(--primary);}

.poolSectionTitle{font-size:13px; text-transform:uppercase; letter-spacing:2px; color:var(--primary); margin:16px 0 8px;}
.grpBanner{font-family:'Anton'; font-size:20px; letter-spacing:1px; text-transform:uppercase; color:#fff; margin:20px 0 4px; padding-bottom:5px; border-bottom:2px solid var(--primary);}
.posHead{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#cfcabb; margin:14px 0 6px;}
.posHead .posTag{background:var(--primary); color:#111; font-family:'JetBrains Mono'; font-weight:700; font-size:11px; padding:2px 7px; border-radius:4px; letter-spacing:0;}
.posHead .posCount{margin-left:auto; font-family:'JetBrains Mono'; font-size:11px; color:#8a8578; font-weight:400;}
.posHead.posDone{opacity:0.4;}
.posHead.posDone .posTag{background:#555; color:#ccc;}
.poolGroupLabel{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#8a8578; margin:10px 0 4px;}
.candGrid{display:flex; flex-direction:column; gap:6px;}
.candCard{background:rgba(255,255,255,0.03); border:1px solid var(--line); border-radius:6px; padding:10px 14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:10px;}
.candCard:hover{border-color:var(--primary); background:rgba(242,194,48,0.08);}
.candCard.disabled{opacity:0.35; cursor:not-allowed;}
.candCard .cname{font-size:16px;}
.candCard .cslot{font-size:11px; color:#8a8578; text-transform:uppercase; letter-spacing:1px;}
.candCard .cstat{display:block; text-transform:none; letter-spacing:0; color:#b7f26f; font-family:'JetBrains Mono'; font-size:11px; margin-top:3px;}
.candCard .covr{font-family:'JetBrains Mono'; font-weight:700; color:var(--primary); font-size:16px; flex-shrink:0;}

.rosterMini{display:flex; flex-direction:column; gap:4px;}
.rosterMini .grpLabel{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--primary); margin:8px 0 3px;}
.rosterMini .slot{display:flex; justify-content:space-between; font-size:14px; padding:6px 8px; border-bottom:1px solid var(--line);}
.rosterMini .slot .p{color:var(--primary); font-family:'JetBrains Mono'; font-size:10px; width:52px; display:inline-block;}
.rosterMini .slot:not(.filled) span.nm{color:#665; font-style:italic;}

table{width:100%; border-collapse:collapse; font-size:15px;}
th,td{text-align:left; padding:8px 10px; border-bottom:1px solid var(--line);}
th{color:var(--primary); text-transform:uppercase; font-size:11px; letter-spacing:1px;}

.gameRow{display:flex; justify-content:space-between; align-items:center; padding:8px 10px; border-bottom:1px solid var(--line); font-size:14px;}
.gameRow .wk{color:#b9b3a2; width:60px;}
.gameRow .res{font-weight:700;}
.gameRow .res.W{color:#5fd97a;}
.gameRow .res.L{color:var(--accent);}
.gameRow.brActive{background:rgba(242,194,48,0.08); border-left:3px solid var(--primary);}
.seg{display:flex; gap:6px; margin-top:6px; flex-wrap:wrap;}
.segBtn{background:transparent; color:#b9b3a2; border:1px solid var(--line); padding:7px 12px; font-family:'Barlow Condensed'; font-weight:600; font-size:13px; text-transform:uppercase; letter-spacing:1px; border-radius:5px; cursor:pointer;}
.segBtn.segOn{background:var(--primary); color:#171308; border-color:var(--primary);}
.awardRow{display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid var(--line);}
.awardRow:last-child{border-bottom:none;}
.awardIc{font-size:26px; line-height:1;}
.awardTitle{font-family:'Barlow Condensed'; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--primary); font-size:15px;}
.awardWho{font-weight:600; font-size:15px;}
.awardNote{font-size:12px; color:#8a8578; margin-top:2px;}
.eraGrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:4px 0;}
.eraCard{background:var(--card); border:2px solid var(--line); border-radius:12px; padding:16px 12px; text-align:left; cursor:pointer; transition:transform .08s, background .15s;}
.eraCard:hover{background:#211d12; transform:translateY(-2px);}
.eraName{font-family:'Anton'; font-size:30px; letter-spacing:1px;}
.eraLabel{font-family:'Barlow Condensed'; font-weight:700; text-transform:uppercase; letter-spacing:1px; font-size:15px; margin-top:2px;}
.eraTag{font-size:12px; color:#8a8578; margin-top:3px;}
.eraFit{display:inline-block; font-family:'JetBrains Mono'; font-size:10px; font-weight:700; padding:1px 6px; border-radius:4px; vertical-align:middle;}
.eraFit.on{background:rgba(95,217,122,0.16); color:#5fd97a;}
.eraFit.off{background:rgba(225,6,0,0.16); color:#ff6a5f;}
.covr .ovrUp{color:#5fd97a;} .covr .ovrDown{color:#ff6a5f;}
.covr .ovrBase{display:block; font-size:10px; color:#6f6a5d; text-decoration:line-through; font-weight:400; text-align:right;}
.candCard.taken{opacity:0.4;}
.candCard.taken .cname{text-decoration:line-through;}
.tagRow{display:flex; flex-wrap:wrap; gap:4px; margin-top:5px;}
.tagChip{font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; padding:1px 6px; border:1px solid; border-radius:4px; background:rgba(255,255,255,0.03);}
.tagList .tagChip{font-size:11px; padding:3px 9px;}
.tagListWrap{display:flex; flex-direction:column; gap:8px;}
.tagCard{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px;}
.tagCardHead{margin-bottom:6px;}
.tagChip.tagBig{font-size:13px; padding:3px 10px;}
.tagCardDesc{font-size:13px; color:#cfcabb; line-height:1.4;}
.legendCard .legHead{font-family:'Barlow Condensed'; font-weight:700; text-transform:uppercase; letter-spacing:2px; font-size:13px; color:var(--primary); margin-bottom:8px;}
.legRow{display:flex; flex-wrap:wrap; gap:6px; align-items:center;}
.legDiv{width:1px; height:16px; background:var(--line); margin:0 4px;}
.scoreOut{font-family:'JetBrains Mono';}

.recordBig{font-family:'Anton'; font-size:56px; color:var(--primary); text-align:center; margin:6px 0;}
.trophy{font-size:46px; text-align:center;}

.achList,.statGrid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
@media(max-width:600px){.achList,.statGrid{grid-template-columns:1fr;}}
.statBox{background:var(--card); border:1px solid var(--cardBorder); border-radius:6px; padding:14px; text-align:center;}
.statBox .v{font-family:'Anton'; font-size:24px; color:var(--primary);}
.statBox .l{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#b9b3a2; margin-top:2px;}

input[type=text]{background:rgba(0,0,0,0.3); border:1px solid var(--line); color:var(--chalk); padding:9px 12px; border-radius:4px; font-family:'Barlow Condensed'; font-size:15px; width:100%;}
label{font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--primary); display:block; margin-bottom:5px;}

.modalBg{position:fixed; inset:0; background:rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
.modalBox{background:var(--bg2); border:1px solid var(--primary); border-radius:8px; max-width:520px; width:100%; max-height:80vh; overflow-y:auto; padding:22px;}
.errBox{border:1px solid var(--accent); background:rgba(226,67,43,0.08); border-radius:6px; padding:12px 14px; margin-top:10px; font-size:14px; text-align:center;}
footer{margin-top:36px; font-size:11px; color:#6b6658; text-align:center; line-height:1.6;}
</style>
</head>

];

/* Each season is played in the chosen era, which shapes how the sim behaves:
   run/pass balance and scoring level shift to match the decade. 2010s is the

const ERA_ORDER = ["1970s","1980s","1990s","2000s","2010s","2020s"];
const ERA_PROFILE = {
 "1970s": {label:"Smashmouth",       tag:"Run-heavy, defense & field goals",   passShare:[0.36,0.47], tdBias:-0.046, fgBias:0.017, c:"#c58f3b"},

};
function eraProfile(){ return ERA_PROFILE[state.chosenEra] || ERA_PROFILE["2010s"]; }
function eraModifier(playerDecade){
  if(!state.chosenEra) return 0;
  const a=ERA_ORDER.indexOf(playerDecade), b=ERA_ORDER.indexOf(state.chosenEra);
  if(a<0||b<0) return 0;
  const d=Math.abs(a-b);
  const OFF={0:3,1:-2,2:-4,3:-5,4:-6,5:-7};   // on-era +3; off-era softens at the far end
  return OFF[d]!==undefined ? OFF[d] : -7;
}
function eraChip(mod){
  if(mod>0) return `<span class="eraFit on">on-era +${mod}</span>`;

];
const DUO_PARTNER = {};
DUO_PAIRS.forEach(([a,b])=>{ DUO_PARTNER[a]=b; DUO_PARTNER[b]=a; });
function duoPartnerOf(name,pos){ const p = DUO_PARTNER[tagKey(name,pos)]; return p ? p.split("|")[0] : null; }

function playerTags(name, pos){
  const k = tagKey(name,pos), t=[];
  if(NFL100_TIER[k]||NFL100_TIER[name]) t.push("NFL100");
  if(ALLDECADE_FIRST.has(name)||ALLDECADE_SECOND.has(name)) t.push("ALLDECADE");
  if(CHAMPION_RINGS[name]!==undefined && CHAMPION_RINGS[name]>0) t.push("CHAMPION");
  if(OFFANCHOR_T1.has(name)||OFFANCHOR_T2.has(name)) t.push("OFFANCHOR");
  if(DEFANCHOR_T1.has(name)||DEFANCHOR_T2.has(name)) t.push("DEFANCHOR");
  if(TIMELESS.has(name)) t.push("TIMELESS");
  if(duoPartnerOf(name,pos)) t.push("DUO");
  if(GAMEBREAK.has(name)) t.push("GAMEBREAK");
  if(BALLHAWK.has(name)) t.push("BALLHAWK");
  return t;
}
const TAG_CAP = 8;   // max always-on tag OVR boost per player
function eraProximity(decade){
  if(!state.chosenEra) return 1;
  const a=ERA_ORDER.indexOf(decade), b=ERA_ORDER.indexOf(state.chosenEra);
  if(a<0||b<0) return 1;
  return [1,0.7,0.45,0.25,0.15,0.1][Math.abs(a-b)] ?? 0.1;
}
function rosterHasName(nm){ return Object.values(state.picks).some(pk=>pk && pk.name===nm); }
function tagBoost(pick, phase){
  const name=pick.name, key=tagKey(name,pick.pos);
  let b=0;
  const tier = NFL100_TIER[key]||NFL100_TIER[name];
  if(tier) b += ({S:6,A:5,B:4,C:3})[tier]||0;
  if(ALLDECADE_FIRST.has(name)) b += 4*eraProximity(pick.decade);
  else if(ALLDECADE_SECOND.has(name)) b += 2*eraProximity(pick.decade);
  if(OFFANCHOR_T1.has(name)||DEFANCHOR_T1.has(name)) b += 4;
  else if(OFFANCHOR_T2.has(name)||DEFANCHOR_T2.has(name)) b += 2;
  if(GAMEBREAK.has(name)) b += 2;
  if(BALLHAWK.has(name)) b += 2;
  const dp=duoPartnerOf(name,pick.pos); if(dp && rosterHasName(dp)) b += 5;
  b = Math.min(b, TAG_CAP);
  if(phase==="playoff" || phase==="superbowl"){
    const rings = CHAMPION_RINGS[name]||0;
    if(rings>0) b += Math.min(6, 1+rings);
  }
  if(phase==="superbowl"){
    const sm = SBMVP[name]||0;
    if(sm>0) b += Math.min(5, 1+sm);
  }
  return b;
}
function effectiveOvr(pick, phase){ return pick ? Math.min(99, Math.round(pick.ovr + tagBoost(pick, phase))) : 0; }

/* ============ STORAGE ============ */
/* Uses window.storage inside Claude's artifact viewer (incl. the shared, cross-user
   leaderboard). When the file is downloaded and opened as a standalone page,
   window.storage doesn't exist, so we fall back to the browser's localStorage
   so personal saves still persist on that device. */
const HAS_WS = (typeof window !== "undefined" && window.storage);
const store = {
  async get(k, shared){
    if(HAS_WS) return window.storage.get(k, shared);
    try{ const v=localStorage.getItem(k); return v!=null?{value:v}:null; }catch(e){ return null; }
  },
  async set(k, v, shared){
    if(HAS_WS) return window.storage.set(k, v, shared);
    try{ localStorage.setItem(k, v); }catch(e){}
  },
  async list(prefix, shared){
    if(HAS_WS) return window.storage.list(prefix, shared);
    try{ const keys=[]; for(let i=0;i<localStorage.length;i++){ const key=localStorage.key(i); if(key&&key.indexOf(prefix)===0) keys.push(key); } return {keys}; }catch(e){ return {keys:[]}; }
  }
};
async function loadLifetime(){
  try{ const r = await store.get("seventeen0-lifetime", false); state.lifetime = r?JSON.parse(r.value):null; }catch(e){ state.lifetime=null; }
  if(!state.lifetime) state.lifetime = {draftsCompleted:0, seasonsPlayed:0, undefeatedRuns:0, totalWins:0, totalLosses:0};
  try{ const a = await store.get("seventeen0-achievements", false); state.achievementsUnlocked = a?JSON.parse(a.value):[]; }catch(e){ state.achievementsUnlocked=[]; }
}
async function saveLifetime(){
  try{ await store.set("seventeen0-lifetime", JSON.stringify(state.lifetime), false); }catch(e){}
  try{ await store.set("seventeen0-achievements", JSON.stringify(state.achievementsUnlocked), false); }catch(e){}
}

/* ============ UTIL ============ */
function rand(min,max){ return Math.random()*(max-min)+min; }
function clamp(v,lo,hi){ return Math.max(lo, Math.min(hi, v)); }
function unlockAchievement(id){ if(!state.achievementsUnlocked.includes(id)) state.achievementsUnlocked.push(id); }
function filledCount(){ return Object.keys(state.picks).length; }
function findOpenSlot(pos){
  const order = POSITION_SLOT_PRIORITY[pos]||[];
  for(const slotCode of order){ if(!state.picks[slotCode]) return slotCode; }
  return null;
}
/* A drafted player can't be taken again anywhere (Gronk on the 2020s Bucs blocks
   Gronk on the 2010s Pats). Identity is the name — except for these names, which
   in this dataset belong to DIFFERENT real people who share a name, so those are
   distinguished by position (e.g. Josh Allen QB vs Josh Allen DL). */
const SAME_NAME_DIFFERENT_PLAYER = new Set([
 "Alex Smith","Antonio Gibson","Charles Johnson","Clay Matthews","Dave Brown","Doug Martin",
 "Eric Green","Jimmy Smith","Josh Allen","Kevin Williams","Mark Carrier","Marvin Jones",
 "Michael Bennett","Michael Carter","Michael Jackson","Mike Davis","Mike Williams",
 "Reggie Williams","Roy Williams","Sean Jones","Ted Washington","Tony McGee"
]);
function playerIdentity(name, pos){
  return SAME_NAME_DIFFERENT_PLAYER.has(name) ? name+"|"+pos : name;
}
function isDrafted(name, pos){
  const id = playerIdentity(name, pos);
  return Object.values(state.picks).some(pk => pk && playerIdentity(pk.name, pk.pos)===id);
}

const REEL_COPIES = 16;
const REEL_SPIN_LOOPS = 6;
const REEL_DURATION = 2700;
function offsetFor(index){ return -(index-1)*REEL_H; }
function buildReelHtml(items){

function goMenu(){ state.screen="menu"; render(); }
function resetReels(){
  state.teamIndex = TEAMS.length;
  state.decadeIndex = DECADES.length;

  state.spinningTeam=false; state.spinningDecade=false;

function validDecadeIdxFor(teamName){
  const t = ROSTER_DATA[teamName]||{}; const out=[];
  DECADES.forEach((d,i)=>{ if(t[d.n] && t[d.n].length) out.push(i); });
  return out;
}
function teamIdxForDecade(decName){
  const out=[];
  TEAMS.forEach((t,i)=>{ const r=ROSTER_DATA[t.n]; if(r && r[decName] && r[decName].length) out.push(i); });
  return out;
}
function spinToIdx(kind, idx){
  const items = kind==="team"?TEAMS:DECADES;
  const len = items.length;
  const committed = kind==="team"?state.teamIndex:state.decadeIndex;
  let target = committed + REEL_SPIN_LOOPS*len;
  target += ((idx - (target % len)) + len) % len;
  if(kind==="team"){ state.spinningTeam=true; state.teamPending=target; }
  else { state.spinningDecade=true; state.decadePending=target; }
  render();
  setTimeout(()=>{
    const restIndex = idx + 2*len;
    if(kind==="team"){ state.spinningTeam=false; state.teamPending=null; state.teamIndex=restIndex; state.teamSpin=TEAMS[idx]; }
    else { state.spinningDecade=false; state.decadePending=null; state.decadeIndex=restIndex; state.decadeSpin=DECADES[idx]; }
    checkRoundReady();
    render();
  }, REEL_DURATION);
}
function spinBoth(){
  if(state.spinningTeam||state.spinningDecade) return;
  state.noMatch=false; state.invalidCombo=false;
  const teamIdx = Math.floor(Math.random()*TEAMS.length);
  const valid = validDecadeIdxFor(TEAMS[teamIdx].n);
  const decIdx = valid.length ? valid[Math.floor(Math.random()*valid.length)] : 0;
  spinToIdx("team", teamIdx);
  spinToIdx("decade", decIdx);
}
function respinTeam(){
  if(state.teamRespinsLeft<=0 || state.spinningTeam || state.spinningDecade || !state.decadeSpin) return;
  const cands = teamIdxForDecade(state.decadeSpin.n).filter(i=> !state.teamSpin || TEAMS[i].n!==state.teamSpin.n);
  if(!cands.length) return;
  state.teamRespinsLeft--; state.noMatch=false; state.invalidCombo=false;
  state.teamSpin=null;
  spinToIdx("team", cands[Math.floor(Math.random()*cands.length)]);
}
function respinDecade(){
  if(state.decadeRespinsLeft<=0 || state.spinningDecade || state.spinningTeam || !state.teamSpin) return;
  const cands = validDecadeIdxFor(state.teamSpin.n).filter(i=> !state.decadeSpin || DECADES[i].n!==state.decadeSpin.n);
  if(!cands.length) return;
  state.decadeRespinsLeft--; state.noMatch=false; state.invalidCombo=false;
  state.decadeSpin=null;
  spinToIdx("decade", cands[Math.floor(Math.random()*cands.length)]);
}
function freeRespinRound(){
  state.teamSpin=null; state.decadeSpin=null;
  resetReels();
  state.noMatch=false; state.invalidCombo=false;
  render();
}
function hydrateReels(){
  [["team", state.teamPending, state.teamIndex],
   ["decade", state.decadePending, state.decadeIndex]].forEach(function(arr){
    const kind=arr[0], pending=arr[1], committed=arr[2];
    const el = document.getElementById(kind+"Strip");
    if(!el) return;
    if(pending!=null){
      el.classList.remove("instant");
      el.style.transform = "translateY("+offsetFor(committed)+"px)";
      void el.offsetHeight;
      requestAnimationFrame(function(){ el.style.transform = "translateY("+offsetFor(pending)+"px)"; });
    } else {
      el.classList.add("instant");
      el.style.transform = "translateY("+offsetFor(committed)+"px)";
    }
  });
}
function checkRoundReady(){
  if(!state.teamSpin || !state.decadeSpin) return;
  const pool = (ROSTER_DATA[state.teamSpin.n]||{})[state.decadeSpin.n];
  if(!pool){ state.invalidCombo=true; return; }
  const anyEligible = pool.some(p=> findOpenSlot(p[1]) !== null && !isDrafted(p[0], p[1]));
  if(!anyEligible){ state.noMatch=true; }
}
function selectPlayer(idx){
  const pool = (ROSTER_DATA[state.teamSpin.n]||{})[state.decadeSpin.n];
  const p = pool[idx];
  const slotCode = findOpenSlot(p[1]);
  if(!slotCode) return;
  if(isDrafted(p[0], p[1])) return;
  let mod = eraModifier(state.decadeSpin.n);
  if(mod < 0 && TIMELESS.has(p[0])) mod = 0;  // Timeless: no era penalty at all
  const adj = clamp(p[2]+mod, 40, 99);
  state.picks[slotCode] = {name:p[0], pos:p[1], ovr:adj, ovrBase:p[2], eraMod:mod, stat:p[3]||"", team:state.teamSpin.n, decade:state.decadeSpin.n, tags:playerTags(p[0], p[1])};
  state.teamSpin=null; state.decadeSpin=null;
  resetReels();
  state.noMatch=false; state.invalidCombo=false;
  if(filledCount() >= SLOTS.length){ finishDraft(); } else { render(); }
}
async function finishDraft(){
  state.lifetime.draftsCompleted++;
  await saveLifetime();
  startSeason();
}

/* ============ SEASON + SIM ENGINE ============ */
function avgOvr(){
  const vals = SLOTS.map(s=> state.picks[s.code].ovr);
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}
function ratings(phase){
  phase = phase||"regular";
  const eo = code => effectiveOvr(state.picks[code], phase);
  const off = (eo("QB")*1.3 + eo("RB") + eo("WR1")*1.05 + eo("WR2")*1.05 + eo("TE")*0.85 + eo("FLEXO")*0.9)/6;
  const def = (eo("DL")*1.05 + eo("DT") + eo("LB")*1.05 + eo("CB")*1.05 + eo("S") + eo("FLEXD")*0.9)/6;
  return {off, def};
}
function teamTagBias(){
  let gb=0, bh=0;
  SLOTS.forEach(s=>{ const p=state.picks[s.code]; if(!p) return; if(GAMEBREAK.has(p.name)) gb++; if(BALLHAWK.has(p.name)) bh++; });
  return { gameBreak: Math.min(0.045, gb*0.02), ballHawk: Math.min(0.045, bh*0.02) };
}

/* ---- realistic scoring: football-legal totals from drives ---- */
function playDrives(off, def, tdBiasExtra){
  const ep = eraProfile();
  const drives = Math.round(rand(9.5,12));
  let tds=0, fgs=0;
  const diff = off - def;
  for(let i=0;i<drives;i++){
    const tdP = clamp(0.185 + diff*0.009 + ep.tdBias + (tdBiasExtra||0), 0.03, 0.55);
    const fgP = clamp(0.14 + diff*0.004 + ep.fgBias, 0.05, 0.28);
    const roll = Math.random();
    if(roll < tdP) tds++;
    else if(roll < tdP+fgP) fgs++;
  }
  return {tds, fgs};
}
function pointsFrom(d){
  let pts = 0;
  for(let i=0;i<d.tds;i++){
    const r = Math.random();
    if(r < 0.05) pts += 8;        // 2-pt conversion
    else if(r < 0.09) pts += 6;   // missed XP
    else pts += 7;                // TD + XP
  }
  pts += d.fgs*3;
  const sfty = Math.random()<0.03; // rare safety
  if(sfty) pts += 2;
  return pts;
}
function simGame(myOff, myDef, oppOff, oppDef, opts){
  opts = opts||{};
  let mine = playDrives(myOff, oppDef, opts.gameBreak||0);
  let theirs = playDrives(oppOff, myDef, -(opts.ballHawk||0));
  let myScore = pointsFrom(mine);
  let oppScore = pointsFrom(theirs);
  let guard=0;
  while(myScore===oppScore && guard++<10){   // no ties: sudden-death OT
    const meFav = (myOff+myDef) >= (oppOff+oppDef);
    const scorer = Math.random() < (meFav?0.57:0.43) ? "me":"opp";
    const td = Math.random()<0.55;
    const pts = td?7:3;
    if(scorer==="me"){ myScore+=pts; if(td)mine.tds++; else mine.fgs++; }
    else { oppScore+=pts; if(td)theirs.tds++; else theirs.fgs++; }
  }
  return {myScore, oppScore, win:myScore>oppScore,
          myTDs:mine.tds, myFGs:mine.fgs, oppTDs:theirs.tds, oppFGs:theirs.fgs};
}

/* ---- per-player season stat accrual ---- */
function blankStats(){ return {gp:0,passYds:0,passTD:0,int:0,rushYds:0,rushTD:0,rec:0,recYds:0,recTD:0,tackles:0,sacks:0,defInt:0}; }
function makeBox(){ const b={}; SLOTS.forEach(s=> b[s.code]=blankStats()); return b; }
function initSeasonStats(){ state.statsReg=makeBox(); state.statsPost=makeBox(); state.awards={}; state.statsView="reg"; }
function addBox(box, code, delta){ const t=box[code]; if(!t) return; for(const k in delta) t[k]=(t[k]||0)+delta[k]; }
function mergeInto(target, box){ SLOTS.forEach(s=>{ const src=box[s.code]; for(const k in src) target[s.code][k]=(target[s.code][k]||0)+src[k]; }); }
function combinedStats(){ const b=makeBox(); mergeInto(b, state.statsReg); mergeInto(b, state.statsPost); return b; }
function weightedPick(list){
  const sum=list.reduce((a,x)=>a+x[1],0)||1; let r=Math.random()*sum;
  for(const x of list){ r-=x[1]; if(r<=0) return x[0]; }
  return list[list.length-1][0];
}
function spreadBox(box, list, yards, field){
  const sum=list.reduce((a,x)=>a+x[1],0)||1;
  list.forEach(x=>{ const y=Math.round(yards*(x[1]/sum)); if(y>0) addBox(box, x[0], {[field]:y}); });
}
function assignBox(box, list, n, field){ for(let i=0;i<n;i++) addBox(box, weightedPick(list), {[field]:1}); }
function distributeMyGame(g){
  const P = state.picks;
  const box = makeBox();
  SLOTS.forEach(s=> addBox(box, s.code, {gp:1}));
  const totalYds = clamp(Math.round(g.myScore*8 + rand(120,175)), 170, 500);
  const ps = eraProfile().passShare;
  const passShare = rand(ps[0], ps[1]);
  let passYds = Math.round(totalYds*passShare);
  let rushYds = totalYds - passYds;
  let rushTD = clamp(Math.round(g.myTDs*rand(0.20,0.45)), 0, g.myTDs);
  let passTD = g.myTDs - rushTD;
  const intThrown = Math.random()<0.58?0:(Math.random()<0.78?1:2);
  const qbScramble = Math.round(rushYds*rand(0,0.10));
  addBox(box, "QB", {passYds, passTD, int:intThrown, rushYds:qbScramble});
  rushYds -= qbScramble;
  // rushing
  const rushers = [["RB", P.RB.ovr]];
  if(P.FLEXO && P.FLEXO.pos==="RB") rushers.push(["FLEXO", P.FLEXO.ovr]);
  spreadBox(box, rushers, rushYds, "rushYds");
  assignBox(box, rushers, rushTD, "rushTD");
  // receiving
  const recs = [["WR1",P.WR1.ovr*1.25],["WR2",P.WR2.ovr],["TE",P.TE.ovr*0.75],["RB",P.RB.ovr*0.35]];
  if(P.FLEXO && (P.FLEXO.pos==="WR"||P.FLEXO.pos==="TE")) recs.push(["FLEXO",P.FLEXO.ovr]);
  const rsum=recs.reduce((a,x)=>a+x[1],0)||1;
  recs.forEach(x=>{ const y=Math.round(passYds*(x[1]/rsum)); const c=y>0?Math.max(1,Math.round(y/rand(11,15))):0; if(y>0) addBox(box, x[0], {recYds:y, rec:c}); });
  assignBox(box, recs, passTD, "recTD");
  // defense: sacks
  const sacks = clamp(Math.round(rand(0,4) + (P.DL.ovr-80)*0.03), 0, 7);
  const rushersD = [["DL",P.DL.ovr*1.2],["DT",P.DT.ovr],["LB",P.LB.ovr*0.7]];
  if(P.FLEXD && ["DL","DT","LB"].includes(P.FLEXD.pos)) rushersD.push(["FLEXD",P.FLEXD.ovr]);
  assignBox(box, rushersD, sacks, "sacks");
  // defense: interceptions
  const dInts = Math.random()<0.6?0:(Math.random()<0.75?1:2);
  const coverers = [["CB",P.CB.ovr*1.1],["S",P.S.ovr],["LB",P.LB.ovr*0.5]];
  if(P.FLEXD && ["CB","S","LB"].includes(P.FLEXD.pos)) coverers.push(["FLEXD",P.FLEXD.ovr]);
  assignBox(box, coverers, dInts, "defInt");
  // defense: tackles
  const tk = Math.round(rand(38,46));
  const tacklers=[["LB",8],["S",7],["CB",5],["DT",4],["DL",4],["FLEXD",5]];
  assignBox(box, tacklers, tk, "tackles");
  return box;
}

/* ---- award scoring ---- */
function offScore(code, v){
  if(!v) return 0;
  if(code==="QB") return v.passYds/25 + v.passTD*4 - v.int*2 + v.rushYds/25 + v.rushTD*4;
  return v.rushYds/10 + v.recYds/12 + (v.rushTD+v.recTD)*6 + v.rec*0.3;
}
function defScore(v){ if(!v) return 0; return v.sacks*8 + v.defInt*12 + v.tackles*0.35; }
function slotMeta(code){ const p=state.picks[code]; return p?`${p.name} (${p.team} ${p.decade})`:code; }
function computeSeasonAwards(){
  const st=state.statsReg, wins=state.season.wins, A={};
  // offensive candidates ranked
  const offRanked = SLOTS.filter(s=>s.group==="Offense").map(s=>({code:s.code, sc:offScore(s.code, st[s.code])}))
    .sort((a,b)=>b.sc-a.sc);
  const defRanked = SLOTS.filter(s=>s.group==="Defense").map(s=>({code:s.code, sc:defScore(st[s.code])}))
    .sort((a,b)=>b.sc-a.sc);
  const topOff=offRanked[0], secondOff=offRanked[1];
  // MVP: elite offensive year on a winning team
  if(topOff && topOff.sc>=273 && wins>=11){ A.mvp={code:topOff.code, note:awardLine(topOff.code, st)}; }
  // OPOY: standout offensive year (the best non-MVP, or a great year with no MVP)
  const opoyPick = A.mvp ? (secondOff && secondOff.sc>=238 ? secondOff : null)
                         : (topOff && topOff.sc>=262 ? topOff : null);
  if(opoyPick){ A.opoy={code:opoyPick.code, note:awardLine(opoyPick.code, st)}; }
  // DPOY: a genuinely dominant defender (splash plays), winning-ish team
  const topDef=defRanked[0];
  if(topDef && topDef.sc>=150 && wins>=9){ A.dpoy={code:topDef.code, note:awardLine(topDef.code, st)}; }
  state.awards = Object.assign(state.awards||{}, A);
}
function awardLine(code, st){
  const v=st[code], p=state.picks[code];
  if(!v||!p) return "";
  if(p.pos==="QB") return `${v.passYds.toLocaleString()} yds, ${v.passTD} TD, ${v.int} INT`;
  if(["RB"].includes(p.pos)) return `${v.rushYds.toLocaleString()} rush yds, ${v.rushTD+v.recTD} TD`;
  if(["WR","TE"].includes(p.pos)) return `${v.rec} rec, ${v.recYds.toLocaleString()} yds, ${v.recTD} TD`;
  return `${v.tackles} tkl, ${v.sacks} sacks, ${v.defInt} INT`;
}
function computeSBMVP(box){
  // best single-game performer in the Super Bowl
  let best=null, bestSc=-1;
  SLOTS.forEach(s=>{
    const v=box[s.code];
    const sc = s.group==="Offense" ? (v.passYds/20 + v.passTD*6 + v.rushYds/10 + v.rushTD*6 + v.recYds/10 + v.recTD*6)
                                   : (v.sacks*8 + v.defInt*14 + v.tackles*1.0);
    if(sc>bestSc){ bestSc=sc; best=s.code; }
  });
  const v=box[best];
  const p=state.picks[best];
  let line = p && p.pos==="QB" ? `${v.passYds} yds, ${v.passTD} TD`
           : p && ["RB","WR","TE"].includes(p.pos) ? `${(v.rushYds+v.recYds)} yds, ${v.rushTD+v.recTD} TD, ${v.rec} rec`
           : `${v.tackles} tkl, ${v.sacks} sk, ${v.defInt} INT`;
  state.awards.sbmvp = {code:best, note:line};
}


function startSeason(){
  const r = ratings("regular");
  if(avgOvr()>=90) unlockAchievement("dynasty");
  const bias = teamTagBias();
  state.season = { off:r.off, def:r.def, week:0, totalWeeks:17, results:[], wins:0, losses:0, complete:false, gameBreak:bias.gameBreak, ballHawk:bias.ballHawk };
  state.playoffs = null;
  initSeasonStats();
  state.screen="season";
  render();
}
function simulateWeek(){
  const s = state.season;
  if(s.week>=s.totalWeeks) return;
  const oppOff = rand(72,92), oppDef = rand(72,92);
  const g = simGame(s.off, s.def, oppOff, oppDef, {gameBreak:s.gameBreak, ballHawk:s.ballHawk});
  mergeInto(state.statsReg, distributeMyGame(g));
  if(g.win) s.wins++; else s.losses++;
  s.results.push({week:s.week+1, myScore:g.myScore, oppScore:g.oppScore, win:g.win});
  s.week++;
  if(g.win && (g.myScore-g.oppScore)>=25) unlockAchievement("blowout");
  if(s.week>=s.totalWeeks){ s.complete=true; finalizeSeason(); }
  render();
}
function simulateAll(){ const s=state.season; while(s.week<s.totalWeeks) simulateWeek(); }

/* ---- playoffs: personal gauntlet to the Super Bowl ---- */
function buildPlayoffs(seed){
  const NAMES=["Wild Card","Divisional","Conference Championship","Super Bowl"];
  const rounds = seed===1 ? NAMES.slice(1) : NAMES;   // 1-seed gets a bye
  return {made:true, seed, rounds, roundIndex:0, results:[], eliminated:false, champion:false};
}
function seedFor(w){ return w>=16?1 : w>=14?2 : w>=12?3 : w>=11?4 : w>=10?5 : w>=9?6 : 0; }
async function finalizeSeason(){
  const s = state.season;
  state.lifetime.seasonsPlayed++;
  state.lifetime.totalWins += s.wins;
  state.lifetime.totalLosses += s.losses;
  if(s.losses===0){ unlockAchievement("undefeated"); state.lifetime.undefeatedRuns++; }
  if(s.wins>=12) unlockAchievement("survivor");
  if(state.lifetime.draftsCompleted>=10) unlockAchievement("grinder");
  const seed = seedFor(s.wins);
  state.playoffs = seed ? buildPlayoffs(seed) : {made:false, seed:0};
  computeSeasonAwards();
  await saveLifetime();
  render();
}
function enterPlayoffs(){ state.screen="playoffs"; render(); }
function simPlayoffGame(){
  const po=state.playoffs, s=state.season;
  if(!po || !po.made || po.eliminated || po.champion) return;
  const r = po.roundIndex;
  const phase = po.rounds[r]==="Super Bowl" ? "superbowl" : "playoff";
  const rr = ratings(phase);
  const globalRound = (po.seed===1?1:0) + r;   // difficulty ramps each round
  const base = 76 + globalRound*2.0;
  const oppOff = clamp(rand(base, base+5), 74, 97);
  const oppDef = clamp(rand(base, base+5), 74, 97);
  const g = simGame(rr.off, rr.def, oppOff, oppDef, {gameBreak:s.gameBreak, ballHawk:s.ballHawk});
  const box = distributeMyGame(g);
  mergeInto(state.statsPost, box);
  po.results.push({round:po.rounds[r], myScore:g.myScore, oppScore:g.oppScore, win:g.win});
  if(g.win){
    if(g.myScore-g.oppScore>=25) unlockAchievement("blowout");
    if(po.rounds[r]==="Super Bowl"){ po.champion=true; computeSBMVP(box); unlockAchievement("champion"); if(po.seed>=5) unlockAchievement("cinderella"); }
    else po.roundIndex++;
  } else { po.eliminated=true; }
  saveLifetime();
  render();
}
function roundReached(){
  const po=state.playoffs;
  if(!po||!po.made) return "Missed playoffs";
  if(po.champion) return "Super Bowl Champion";
  const played = po.results.length;
  if(played===0) return "Made playoffs (seed "+po.seed+")";
  const last = po.results[po.results.length-1];
  return po.eliminated ? ("Lost in "+last.round) : last.round;
}

function openStats(){ state.prevScreen=state.screen; state.screen="stats"; render(); }
function backFromStats(){ state.screen = state.prevScreen||"season"; render(); }

async function submitToLeaderboard(name){
  const s = state.season, po = state.playoffs, aw = state.awards||{};
  const honors = [];
  if(aw.mvp) honors.push("MVP");
  if(aw.dpoy) honors.push("DPOY");
  if(aw.sbmvp && po && po.champion) honors.push("SB MVP");
  await saveToLeaderboard({
    name: name||"Anonymous Coach", wins:s.wins, losses:s.losses,
    undefeated: s.losses===0, avgOvr: avgOvr(), era: state.chosenEra||"",
    champion: !!(po && po.champion), roundReached: roundReached(), honors,
    roster: SLOTS.map(sl=> sl.label+": "+state.picks[sl.code].name+" ("+state.picks[sl.code].team+", "+state.picks[sl.code].decade+")"),
    date: new Date().toISOString().slice(0,10)
  });
  state.leaderboardCache = await fetchLeaderboard();
  state.lbView = "best"; state.prevScreen = state.screen; state.screen = "leaderboards";
  render();
}

function renderDraft(){

      rosterHtml += `<div class="slot ${pl?'filled':''}"><span class="p">${s.label}</span><span class="nm">${pl ? pl.name+' · '+pl.ovr+' · '+pl.team.split(' ').slice(-1)[0]+' '+pl.decade+(pl.eraMod?' '+eraChip(pl.eraMod):'') : '— empty —'}</span></div>`;

  } else {

    const OFF_ORDER = ["QB","RB","WR","TE"];
    const DEF_ORDER = ["DL","DT","LB","CB","S"];
    const eMod = eraModifier(state.decadeSpin.n);
    function cardFor(p,i){
      const taken = isDrafted(p[0], p[1]);
      const slotOpen = findOpenSlot(p[1]) !== null;
      const eligible = slotOpen && !taken;
      const stat = p[3] ? `<span class="cstat">${p[3]}</span>` : '';
      const adj = clamp(p[2]+eMod, 40, 99);
      const ovrCell = eMod!==0
        ? `<div class="covr"><span class="${eMod>0?'ovrUp':'ovrDown'}">${adj}</span><span class="ovrBase">${p[2]}</span></div>`
        : `<div class="covr">${p[2]}</div>`;
      const note = taken ? ' · already drafted' : (slotOpen ? '' : ' · slot filled');
      const tags = playerTags(p[0], p[1]);
      const tagHtml = tags.length ? `<div class="tagRow">${tags.map(t=>{

      }).join('')}</div>` : '';
      return `<div class="candCard ${eligible?'':'disabled'} ${taken?'taken':''}" onclick="${eligible?`selectPlayer(${i})`:''}">

    function posGroups(order){
      let html = "";
      order.forEach(pos=>{

        html += `<div class="posHead ${slotOpen?'':'posDone'}"><span class="posTag">${pos}</span>${POS_LABELS[pos]||pos}<span class="posCount">${list.length}</span></div>`;
        html += `<div class="candGrid">${list.map(x=>cardFor(x.p,x.i)).join('')}</div>`;

      return html;

    const offHtml = posGroups(OFF_ORDER);

      ? `<span class="eraFit on">on-era +3</span> — this stint matches your ${state.chosenEra} era`

      <div class="reelRow">${renderReel("team")}${renderReel("decade")}</div>

      ${defHtml || '<p class="small">No defensive players found for this stint.</p>'}
    </div>`;
  }

  return `${Scorebug()}
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span class="small">Building your roster</span>
      <span class="small mono">${pct}% drafted (${filledCount()}/${SLOTS.length})</span>

  </div>
  ${tagLegend()}

function renderStats(){
  const P = state.picks;
  const view = state.statsView||"reg";
  const hasPost = state.statsPost && state.statsPost.QB && state.statsPost.QB.gp>0;
  const st = view==="post" ? state.statsPost : view==="combined" ? combinedStats() : state.statsReg;
  const nm = code => P[code] ? P[code].name : code;
  const gp = st.QB ? st.QB.gp : 0;
  const passRows = [["QB", st.QB]].filter(x=>x[1] && (x[1].passYds>0))
    .map(([c,v])=>`<tr><td>${nm(c)}</td><td class="mono">${v.passYds.toLocaleString()}</td><td class="mono">${v.passTD}</td><td class="mono">${v.int}</td></tr>`).join('');
  const rushRows = SLOTS.map(s=>[s.code, st[s.code]]).filter(([c,v])=>v && v.rushYds>0)
    .sort((a,b)=>b[1].rushYds-a[1].rushYds)
    .map(([c,v])=>`<tr><td>${nm(c)}</td><td class="mono">${v.rushYds.toLocaleString()}</td><td class="mono">${v.rushTD}</td></tr>`).join('');
  const recRows = SLOTS.map(s=>[s.code, st[s.code]]).filter(([c,v])=>v && v.recYds>0)
    .sort((a,b)=>b[1].recYds-a[1].recYds)
    .map(([c,v])=>`<tr><td>${nm(c)}</td><td class="mono">${v.rec}</td><td class="mono">${v.recYds.toLocaleString()}</td><td class="mono">${v.recTD}</td></tr>`).join('');
  const defRows = SLOTS.filter(s=>s.group==="Defense").map(s=>[s.code, st[s.code]]).filter(([c,v])=>v)
    .sort((a,b)=>(b[1].sacks+b[1].defInt*2+b[1].tackles*0.05)-(a[1].sacks+a[1].defInt*2+a[1].tackles*0.05))
    .map(([c,v])=>`<tr><td>${nm(c)}</td><td class="mono">${v.tackles}</td><td class="mono">${v.sacks}</td><td class="mono">${v.defInt}</td></tr>`).join('');
  const tab = (v,label)=>`<button class="segBtn ${view===v?'segOn':''}" onclick="setStatsView('${v}')">${label}</button>`;
  const toggle = hasPost ? `<div class="seg">${tab("reg","Regular Season")}${tab("post","Playoffs")}${tab("combined","Combined")}</div>` : '';

  return `${Scorebug()}
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2>Player Stats</h2><span class="small mono">${gp} games</span>
    </div>
    ${toggle || '<p class="small">Regular-season production.</p>'}
  </div>
  ${view==="reg" ? awardsCard() : ""}
  <div class="card"><h3 style="margin-bottom:6px;">Passing</h3>
    <table><thead><tr><th>Player</th><th>Yds</th><th>TD</th><th>INT</th></tr></thead><tbody>${passRows||'<tr><td class="small">No data</td></tr>'}</tbody></table></div>
  <div class="card"><h3 style="margin-bottom:6px;">Rushing</h3>
    <table><thead><tr><th>Player</th><th>Yds</th><th>TD</th></tr></thead><tbody>${rushRows||'<tr><td class="small">No data</td></tr>'}</tbody></table></div>
  <div class="card"><h3 style="margin-bottom:6px;">Receiving</h3>
    <table><thead><tr><th>Player</th><th>Rec</th><th>Yds</th><th>TD</th></tr></thead><tbody>${recRows||'<tr><td class="small">No data</td></tr>'}</tbody></table></div>
  <div class="card"><h3 style="margin-bottom:6px;">Defense</h3>
    <table><thead><tr><th>Player</th><th>Tkl</th><th>Sacks</th><th>INT</th></tr></thead><tbody>${defRows||'<tr><td class="small">No data</td></tr>'}</tbody></table></div>
  <div class="card center"><button class="btn secondary" onclick="backFromStats()">← Back</button></div>
  ${Footer()}`;
}

function HowToModal(){
  if(!howToOpen) return '';
  return `<div class="modalBg" onclick="closeModals(event)"><div class="modalBox">
    <h2 style="margin-bottom:10px;">How to Play</h2>
    <p class="small" style="margin-bottom:8px;">1. Tap Spin — one button spins both the Team and Decade wheels together.</p>
    <p class="small" style="margin-bottom:8px;">2. You'll see every notable player who played for that team during that decade, grouped by position.</p>
    <p class="small" style="margin-bottom:8px;">3. Tap a player to slot them into your roster: Offense is QB, RB, WR, WR, TE, and a Flex (RB/WR/TE). Defense is DL, DT, LB, CB, S, and a Flex (any defensive position).</p>
    <p class="small" style="margin-bottom:8px;">4. Don't love a spin? You get one free Team respin and one free Decade respin per game — use them whenever you want.</p>
    <p class="small" style="margin-bottom:8px;">5. Once all 12 slots are filled, simulate a 17-game season. Every game produces real box-score stats for your players — check the Season Stats screen anytime.</p>
    <p class="small" style="margin-bottom:8px;">6. Nine-plus wins puts you in the playoffs. Win your way through the Wild Card, Divisional, and Conference rounds to the Super Bowl — opponents get tougher each round, and it's single elimination.</p>
    <button class="btn" onclick="closeModals()">Got it</button>
  </div></div>`;
}
function LeaderboardModal(){
  if(!leaderboardOpen) return '';
  const rows = (state.leaderboardCache||[]).map(e=>`<tr><td>${e.name}${(e.honors&&e.honors.length)?' <span class="mono" style="color:var(--primary); font-size:11px;">'+e.honors.join('·')+'</span>':''}</td><td class="mono">${e.wins}-${e.losses}</td><td>${e.champion?'👑':(e.undefeated?'🏆':'')}</td><td class="small">${e.roundReached||''}</td><td class="mono">${e.avgOvr}</td></tr>`).join('') || '<tr><td colspan="5" class="small">No entries yet — be the first!</td></tr>';
  return `<div class="modalBg" onclick="closeModals(event)"><div class="modalBox">
    <h2 style="margin-bottom:10px;">Leaderboard</h2>
    <table><thead><tr><th>Coach</th><th>Record</th><th>Title</th><th>Playoffs</th><th>Avg OVR</th></tr></thead><tbody>${rows}</tbody></table>
    <button class="btn" style="margin-top:14px;" onclick="closeModals()">Close</button>
  </div></div>`;
}
function LifetimeModal(){
  if(!lifetimeOpen) return '';
  const l = state.lifetime;
  return `<div class="modalBg" onclick="closeModals(event)"><div class="modalBox">
    <h2 style="margin-bottom:10px;">Lifetime Stats</h2>
    <div class="statGrid">
      <div class="statBox"><div class="v">${l.draftsCompleted}</div><div class="l">Drafts Completed</div></div>
      <div class="statBox"><div class="v">${l.undefeatedRuns}</div><div class="l">17-0 Seasons</div></div>
      <div class="statBox"><div class="v">${l.totalWins}</div><div class="l">Total Wins</div></div>
      <div class="statBox"><div class="v">${l.totalLosses}</div><div class="l">Total Losses</div></div>
    </div>
    <button class="btn" style="margin-top:14px;" onclick="closeModals()">Close</button>
  </div></div>`;
}
function AchievementsModal(){
  if(!achievementsOpen) return '';
  const rows = ACHIEVEMENTS.map(a=>{
    const unlocked = state.achievementsUnlocked.includes(a.id);
    return `<div class="candCard" style="cursor:default; opacity:${unlocked?1:0.45};">
      <div style="display:flex; gap:12px; align-items:center;"><span style="font-size:24px;">${a.icon}</span><div><div style="font-weight:600;">${a.name}</div><div class="cslot">${a.desc}</div></div></div>
    </div>`;
  }).join('');
  return `<div class="modalBg" onclick="closeModals(event)"><div class="modalBox">
    <h2 style="margin-bottom:10px;">Achievements</h2>
    <div class="achList">${rows}</div>
    <button class="btn" style="margin-top:14px;" onclick="closeModals()">Close</button>
  </div></div>`;
}

function render(){
  let html="";
  if(state.screen==="menu") html=renderMenu();
  else if(state.screen==="era") html=renderEra();
  else if(state.screen==="draft") html=renderDraft();
  else if(state.screen==="season") html=renderSeason();
  else if(state.screen==="playoffs") html=renderPlayoffs();
  else if(state.screen==="stats") html=renderStats();
  else if(state.screen==="leaderboards") html=renderLeaderboards();
  else if(state.screen==="tags") html=renderTags();
  document.getElementById("app").innerHTML = html + HowToModal() + LeaderboardModal() + LifetimeModal() + AchievementsModal();
  if(state.screen==="draft") hydrateReels();
}
function closeModals(e){ if(e && e.target!==e.currentTarget) return; howToOpen=leaderboardOpen=lifetimeOpen=achievementsOpen=false; render(); }
function openHowTo(){ howToOpen=true; render(); }
async function openLeaderboard(){ state.leaderboardCache = await fetchLeaderboard(); leaderboardOpen=true; render(); }
async function openLeaderboards(){ state.leaderboardCache = await fetchLeaderboard(); state.lbView = state.lbView||"best"; state.prevScreen = state.screen; state.screen = "leaderboards"; render(); }
function setLbView(v){ state.lbView = v; render(); }
function openTags(){ state.prevScreen = state.screen; state.screen = "tags"; render(); }
function backFromTags(){ state.screen = (state.prevScreen && state.prevScreen!=="tags") ? state.prevScreen : "menu"; render(); }
function backFromLeaderboards(){ state.screen = (state.prevScreen && state.prevScreen!=="leaderboards") ? state.prevScreen : "menu"; render(); }
function openLifetime(){ lifetimeOpen=true; render(); }
function openAchievements(){ achievementsOpen=true; render(); }

(async function init(){ await loadLifetime(); render(); })();
</script>
</body>
</html>
