.center{text-align:center;}

.btn{background:var(--primary); color:#171308; border:none; padding:12px 26px; font-family:'Barlow Condensed'; font-weight:700; font-size:16px; text-transform:uppercase; letter-spacing:1px; border-radius:5px; cursor:pointer;}
.btn.secondary{background:transparent; color:var(--chalk); border:1px solid var(--line);}

.yardline{border:none; border-top:1px dashed var(--line); margin:20px 0;}

.reelLabel{font-size:12px; text-transform:uppercase; letter-spacing:2px; color:var(--primary);}
.reelStage{position:relative; width:100%; height:132px; overflow:hidden; border-radius:8px; background:#000; border:1px solid var(--line);}
.reelStrip{position:absolute; left:0; top:0; width:100%; transition:transform 2.65s cubic-bezier(0.15,0.9,0.15,1);}
.reelStrip.instant{transition:none;}
.reelItem{height:44px; display:flex; align-items:center; gap:8px; padding:0 14px; font-size:16px; color:#7a7568;}
.reelItem .sw{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.reelHighlight{position:absolute; top:44px; left:0; width:100%; height:44px; border-top:1px solid var(--primary); border-bottom:1px solid var(--primary); background:rgba(242,194,48,0.08); pointer-events:none; z-index:2;}

.resultPill{display:inline-flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--primary); border-radius:20px; padding:6px 16px; font-size:15px;}

table{width:100%; border-collapse:collapse; font-size:15px;}
th,td{text-align:left; padding:8px 10px; border-bottom:1px solid var(--line);}

.seg{display:flex; gap:6px; margin-top:6px; flex-wrap:wrap;}

.awardRow{display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid var(--line);}

.eraGrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:4px 0;}

.eraLabel{font-family:'Barlow Condensed'; font-weight:700; text-transform:uppercase; letter-spacing:1px; font-size:15px; margin-top:2px;}
.eraTag{font-size:12px; color:#8a8578; margin-top:3px;}

.tagList .tagChip{font-size:11px; padding:3px 9px;}
.tagListWrap{display:flex; flex-direction:column; gap:8px;}
.tagCard{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px;}

.tagChip.tagBig{font-size:13px; padding:3px 10px;}
.tagCardDesc{font-size:13px; color:#cfcabb; line-height:1.4;}
.legendCard .legHead{font-family:'Barlow Condensed'; font-weight:700; text-transform:uppercase; letter-spacing:2px; font-size:13px; color:var(--primary); margin-bottom:8px;}

.gradeCard{border:1px solid rgba(242,194,48,.35);}

.gradeBig .gradeLetter{font-size:34px; opacity:.9;}
.gradeLabel{font-family:'Barlow Condensed',sans-serif; letter-spacing:3px; font-size:14px; color:#9a9a9a; margin-top:2px;}
.gradeBreak{display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:12px; font-size:13px; color:#c8c8c8;}

.lbHot{color:var(--primary) !important; font-weight:700;}
th.lbHot{color:var(--primary) !important;}
.trophy{font-size:46px; text-align:center;}

.achList,.statGrid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
@media(max-width:600px){.achList{grid-template-columns:1fr;}}
.statBox{background:var(--card); border:1px solid var(--cardBorder); border-radius:6px; padding:14px; text-align:center;}
.statBox .v{font-family:'Anton'; font-size:24px; color:var(--primary);}
.statBox .l{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#b9b3a2; margin-top:2px;}

input[type=text]{background:rgba(0,0,0,0.3); border:1px solid var(--line); color:var(--chalk); padding:9px 12px; border-radius:4px; font-family:'Barlow Condensed'; font-size:15px; width:100%;}
label{font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--primary); display:block; margin-bottom:5px;}

.modalBg{position:fixed; inset:0; background:rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
.modalBox{background:var(--bg2); border:1px solid var(--primary); border-radius:8px; max-width:520px; width:100%; max-height:80vh; overflow-y:auto; padding:22px;}

footer{margin-top:36px; font-size:11px; color:#6b6658; text-align:center; line-height:1.6;}
/* achievement toasts (outside render root) */
.toastWrap{position:fixed; top:14px; left:0; right:0; z-index:9999; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; padding:0 12px;}
.achToast{display:flex; align-items:center; gap:11px; background:#141a24; border:1px solid var(--primary); border-left:4px solid var(--primary); border-radius:9px; padding:10px 15px; box-shadow:0 10px 30px rgba(0,0,0,0.55); transform:translateY(-26px) scale(.96); opacity:0; transition:transform .38s cubic-bezier(.2,.9,.25,1), opacity .38s; max-width:420px; width:100%;}
.achToast.show{transform:translateY(0) scale(1); opacity:1;}
.achToast.hide{transform:translateY(-14px) scale(.98); opacity:0;}
.achToastIcon{font-size:24px; line-height:1;}
.achToastBody{display:flex; flex-direction:column; line-height:1.15; min-width:0;}

.achToastName{font-family:'Barlow Condensed'; font-size:16px; color:var(--chalk); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
/* championship confetti */
.confettiLayer{position:fixed; inset:0; pointer-events:none; z-index:9998; overflow:hidden;}
.confetti{position:absolute; top:-16px; border-radius:2px; animation-name:confFall; animation-timing-function:linear; animation-fill-mode:forwards;}
@keyframes confFall{ 0%{transform:translateY(0) rotate(0); opacity:1;} 100%{transform:translateY(108vh) rotate(760deg); opacity:.85;} }
/* championship banner */
.champTrophy{font-size:64px; line-height:1; animation:champPop .6s cubic-bezier(.2,1.4,.4,1) both;}
@keyframes champPop{ 0%{transform:scale(0) rotate(-25deg); opacity:0;} 60%{transform:scale(1.25) rotate(8deg);} 100%{transform:scale(1) rotate(0); opacity:1;} }
.champTitle{font-family:'Anton'; font-size:34px; letter-spacing:1px; color:var(--primary); text-shadow:0 0 18px rgba(242,194,48,0.45); margin-top:6px; line-height:1.05;}
</style>

function statKey(name, dec){ return String(name).trim().toLowerCase()+"|"+dec; }
function statKeyTeam(name, team, dec){ return String(name).trim().toLowerCase()+"|"+String(team||"").trim().toLowerCase()+"|"+dec; }
function fullStat(name, team, dec, fallback){
  // team-specific season first, then decade-level line, then blurb fallback
  if(team){ const st = STAT_LINES[statKeyTeam(name,team,dec)]; if(st!==undefined) return st; }
  const s = STAT_LINES[statKey(name,dec)];
  return (s!==undefined ? s : (fallback||""));
}

// Three tiers vs. your chosen era:
//  1) you rolled the exact era you chose  -> this IS that-era version      -> +3
//  2) different stint, but he played your chosen era -> right guy, wrong yr -> 0 (no bonus, no penalty)
//  3) he never played your chosen era -> penalty scaled to his NEAREST real era
/* Era fit. Rule 1: your chosen era = +3. Rule 2: a player who ALSO played your era
   crosses over cleanly (0). Otherwise the fit is POSITION- and DIRECTION-specific,
   because rule changes reshaped what each position is worth over time. The modern
   pass-happy rulebook LIFTS quarterbacks, receivers and pass-rushers when they move
   forward in time, while it devalues workhorse backs, interior run-stuffers, thumping
   linebackers and old-school press corners (whose style modern rules made illegal). Moving the other way - a modern player back into an older,
   more physical game - flips those effects: finesse, rules-dependent positions (QB/WR)
   still struggle, but the physical positions (RB and the front seven) are neutral-to-
   BOOSTED, because athletic evolution gives them a real edge over older competition.
   Magnitude scales with the decades crossed.
   fwd = an OLDER player pulled forward into a newer era; bwd = a NEWER player sent back. */
const ERA_LEAN = {
  QB: {fwd:+0.4, bwd:-1.8},   // value ROSE: old QBs thrive fwd under modern passing rules; modern QB game needs those rules, struggles going back
  WR: {fwd:+0.3, bwd:-1.5},   // value ROSE: modern rules free up receivers so an old WR feasts fwd; hostile press + low volume hurts going back
  TE: {fwd:+0.0, bwd:+0.0},   // era-agnostic: bigger receiving role fwd vs bigger blocking role back roughly wash out
  RB: {fwd:-2.5, bwd:+0.5},   // value FELL: workhorse devalued in the modern game; old game prized it + modern back has the edge -> boost back
  DL: {fwd:+0.2, bwd:+0.2},   // era-proof: pass rush matters in every era + modern size/speed -> slight boost BOTH ways
  DT: {fwd:-2.0, bwd:+0.3},   // interior run-stuffing devalued fwd; premium + size edge going back
  LB: {fwd:-1.8, bwd:+0.2},   // thumpers off the field on passing downs fwd; athletic edge in a run-heavy era going back
  CB: {fwd:-2.5, bwd:+0.0},   // press style made ILLEGAL going fwd; legal bump-and-run suits a bigger/faster corner going back (neutral)
  S:  {fwd:-2.2, bwd:+0.0}    // enforcer hitting penalized (targeting) fwd; fit the old physical game going back (neutral)
};

function eraModifier(playerDecade, playerName, playerPos){
  if(!state.chosenEra) return 0;
  const b = ERA_ORDER.indexOf(state.chosenEra);
  if(b<0) return 0;
  const cell = ERA_ORDER.indexOf(playerDecade);
  if(cell===b) return 3;                                   // Rule 1: this stint is your chosen era
  let played=null;
  if(playerName){ const m=playerErasMap()[playerName.trim().toLowerCase()]; if(m&&m.length) played=m; }
  if(!played){ played = cell>=0 ? [cell] : []; }
  if(played.indexOf(b)!==-1) return 0;                     // Rule 2: also played your era - clean crossover
  if(!played.length) return 0;
  const base = (playerPos && ERA_LEAN[playerPos]) ? ERA_LEAN[playerPos] : ERA_LEAN_DEFAULT;
  const ov = playerName ? ERA_ARCHETYPE[playerName.trim()+"|"+playerPos] : null;
  const leanFwd = (ov && ov.fwd!==undefined) ? ov.fwd : base.fwd;
  const leanBwd = (ov && ov.bwd!==undefined) ? ov.bwd : base.bwd;
  let best = -Infinity;                                    // player's most transferable real era wins
  for(const a of played){
    const gap = Math.abs(a - b);
    if(gap===0) continue;
    const rate = (a < b) ? leanFwd : leanBwd;             // a<b: player is older -> being pulled forward in time
    const pen  = Math.round(rate * gap);
    if(pen > best) best = pen;
  }
  if(!isFinite(best)) return 0;
  best = Math.max(-10, Math.min(6, best));                 // floor -10; cap any cross-era bonus at +6
  if(best < 0 && playerName && TIMELESS.has(playerName)) return 0;   // Timeless: never take an era penalty (a forward bonus is fine)
  return best;
}

  if(mod>0) return `<span class="eraFit on">on-era +${mod}</span>`;
  if(mod<0) return `<span class="eraFit off">off-era ${mod}</span>`;
  return "";
}

function eraProximity(decade){

function tagBoost(pick, phase){

  if(tier) b += ({S:6,A:5,B:4,C:3})[tier]||0;
  if(ALLDECADE_FIRST.has(name)) b += 4*eraProximity(pick.decade);
  else if(ALLDECADE_SECOND.has(name)) b += 2*eraProximity(pick.decade);
  if(OFFANCHOR_T1.has(name)||DEFANCHOR_T1.has(name)) b += 4;
  else if(OFFANCHOR_T2.has(name)||DEFANCHOR_T2.has(name)) b += 2;
  if(GAMEBREAK.has(name)) b += 2;
  if(BALLHAWK.has(name)) b += 2;
  const dp=duoPartnerOf(name,pick.pos); if(dp && rosterHasName(dp)) b += 5;
  b = Math.min(b, TAG_CAP);
  if(phase==="playoff" || phase==="superbowl"){
    const rings = CHAMPION_RINGS[name]||0;
    if(rings>0) b += Math.min(6, 1+rings);
  }
  if(phase==="superbowl"){
    const sm = SBMVP[name]||0;
    if(sm>0) b += Math.min(5, 1+sm);
  }
  return b;
}

function lbMetricVal(e, metric){
  if(metric==='ovr') return e.avgOvr||0;
  if(metric==='record') return (e.totalWins!=null?e.totalWins:(e.wins||0));
  return (e.score!=null?e.score:0);
}
function lbRank(list, metric, dir){
  const s = [...list];
  s.sort((a,b)=>{
    let d = lbMetricVal(b,metric) - lbMetricVal(a,metric);
    if(metric==='record'){
      d = d || ((b.champion?1:0)-(a.champion?1:0))
            || (((a.totalLosses!=null?a.totalLosses:a.losses)||0)-((b.totalLosses!=null?b.totalLosses:b.losses)||0))
            || ((b.score||0)-(a.score||0));
    } else if(metric==='ovr'){
      d = d || ((b.totalWins||b.wins||0)-(a.totalWins||a.wins||0)) || ((b.score||0)-(a.score||0));
    } else {
      d = d || ((b.champion?1:0)-(a.champion?1:0)) || ((b.totalWins||b.wins||0)-(a.totalWins||a.wins||0)) || ((b.avgOvr||0)-(a.avgOvr||0));
    }
    return d;
  });
  if(dir==='worst') s.reverse();
  return s.slice(0,10);
}

function findOpenSlot(pos, name, decade){
  const order = POSITION_SLOT_PRIORITY[pos]||[];
  for(const slotCode of order){ if(!state.picks[slotCode]) return slotCode; }
  // secondary eligibility: players who genuinely played another position that era
  for(const sp of secondaryPositions(name, decade)){

    for(const slotCode of so){ if(!state.picks[slotCode]) return slotCode; }
  }

}

const SAME_NAME_DIFFERENT_PLAYER = new Set([

 "Michael Bennett","Michael Carter","Michael Jackson","Mike Davis","Mike Williams",

/* stable per-stint jumble so order doesn't reshuffle on re-render */
function _hashStr(str){ let h=2166136261>>>0; for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619);} return h>>>0; }
function _mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function seededShuffle(arr, seedStr){ const rng=_mulberry32(_hashStr(seedStr)); const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

function validDecadeIdxFor(teamName){
  const t = ROSTER_DATA[teamName]||{}; const out=[];
  DECADES.forEach((d,i)=>{ if(t[d.n] && t[d.n].length) out.push(i); });
  return out;
}
function teamIdxForDecade(decName){
  const out=[];
  TEAMS.forEach((t,i)=>{ const r=ROSTER_DATA[t.n]; if(r && r[decName] && r[decName].length) out.push(i); });
  return out;
}
function spinToIdx(kind, idx){
  const items = kind==="team"?TEAMS:DECADES;
  const len = items.length;
  const committed = kind==="team"?state.teamIndex:state.decadeIndex;
  let target = committed + REEL_SPIN_LOOPS*len;
  target += ((idx - (target % len)) + len) % len;
  if(kind==="team"){ state.spinningTeam=true; state.teamPending=target; }
  else { state.spinningDecade=true; state.decadePending=target; }
  render();
  setTimeout(()=>{
    const restIndex = idx + 2*len;
    if(kind==="team"){ state.spinningTeam=false; state.teamPending=null; state.teamIndex=restIndex; state.teamSpin=TEAMS[idx]; }
    else { state.spinningDecade=false; state.decadePending=null; state.decadeIndex=restIndex; state.decadeSpin=DECADES[idx]; }
    checkRoundReady();
    render();
  }, REEL_DURATION);
}
function spinBoth(){
  if(state.spinningTeam||state.spinningDecade) return;
  state.noMatch=false; state.invalidCombo=false;
  const teamIdx = Math.floor(Math.random()*TEAMS.length);
  const valid = validDecadeIdxFor(TEAMS[teamIdx].n);
  const decIdx = valid.length ? valid[Math.floor(Math.random()*valid.length)] : 0;
  spinToIdx("team", teamIdx);
  spinToIdx("decade", decIdx);
}
function respinTeam(){
  if(state.teamRespinsLeft<=0 || state.spinningTeam || state.spinningDecade || !state.decadeSpin) return;
  const cands = teamIdxForDecade(state.decadeSpin.n).filter(i=> !state.teamSpin || TEAMS[i].n!==state.teamSpin.n);
  if(!cands.length) return;
  state.teamRespinsLeft--; state.noMatch=false; state.invalidCombo=false;
  state.teamSpin=null;
  spinToIdx("team", cands[Math.floor(Math.random()*cands.length)]);
}
function respinDecade(){
  if(state.decadeRespinsLeft<=0 || state.spinningDecade || state.spinningTeam || !state.teamSpin) return;
  const cands = validDecadeIdxFor(state.teamSpin.n).filter(i=> !state.decadeSpin || DECADES[i].n!==state.decadeSpin.n);
  if(!cands.length) return;
  state.decadeRespinsLeft--; state.noMatch=false; state.invalidCombo=false;
  state.decadeSpin=null;
  spinToIdx("decade", cands[Math.floor(Math.random()*cands.length)]);
}
function freeRespinRound(){

function hydrateReels(){
  [["team", state.teamPending, state.teamIndex],
   ["decade", state.decadePending, state.decadeIndex]].forEach(function(arr){
    const kind=arr[0], pending=arr[1], committed=arr[2];
    const el = document.getElementById(kind+"Strip");
    if(!el) return;
    if(pending!=null){
      el.classList.remove("instant");
      el.style.transform = "translateY("+offsetFor(committed)+"px)";
      void el.offsetHeight;
      requestAnimationFrame(function(){ el.style.transform = "translateY("+offsetFor(pending)+"px)"; });
    } else {
      el.classList.add("instant");
      el.style.transform = "translateY("+offsetFor(committed)+"px)";
    }
  });
}
function checkRoundReady(){
  if(!state.teamSpin || !state.decadeSpin) return;
  const pool = (ROSTER_DATA[state.teamSpin.n]||{})[state.decadeSpin.n];
  if(!pool){ state.invalidCombo=true; return; }
  const anyEligible = pool.some(p=> findOpenSlot(p[1], p[0], state.decadeSpin.n) !== null && !isDrafted(p[0], p[1]));
  if(!anyEligible){ state.noMatch=true; }
}
function selectPlayer(idx){
  const pool = (ROSTER_DATA[state.teamSpin.n]||{})[state.decadeSpin.n];
  const p = pool[idx];
  const slotCode = findOpenSlot(p[1], p[0], state.decadeSpin.n);
  if(!slotCode) return;
  if(isDrafted(p[0], p[1])) return;
  let mod = eraModifier(state.decadeSpin.n, p[0], p[1]);
  const adj = clamp(p[2]+mod, 40, 99);
  // draft-grade: compare this pick to the best ELIGIBLE player on the board right now
  let bestAdj = adj;
  for(const q of pool){
    if(isDrafted(q[0], q[1])) continue;
    if(!findOpenSlot(q[1], q[0], state.decadeSpin.n)) continue;
    let qm = eraModifier(state.decadeSpin.n, q[0], q[1]);
    const qa = clamp(q[2]+qm, 40, 99);
    if(qa > bestAdj) bestAdj = qa;
  }
  if(state.draft){ state.draft.pickedSum += adj; state.draft.bestSum += bestAdj; state.draft.picks++; }
  state.picks[slotCode] = {name:p[0], pos:p[1], ovr:adj, ovrBase:p[2], eraMod:mod, stat:p[3]||"", team:state.teamSpin.n, decade:state.decadeSpin.n, tags:playerTags(p[0], p[1]), crossPos: !(POSITION_SLOT_PRIORITY[p[1]]||[]).includes(slotCode)};
  state.teamSpin=null; state.decadeSpin=null;
  resetReels();
  state.noMatch=false; state.invalidCombo=false;
  if(filledCount() >= SLOTS.length){ finishDraft(); } else { render(); }
}
function checkDraftAchievements(){
  const codes = SLOTS.map(s=>s.code);
  const picks = codes.map(c=>state.picks[c]).filter(Boolean);
  if(picks.length < codes.length) return;
  const avg = avgOvr();
  if(avg>=90) unlockAchievement("dynasty");
  if(avg>=92) unlockAchievement("superteam");
  if(avg>=94) unlockAchievement("perfectstorm");
  if(picks.some(p=>p.ovr>=99)) unlockAchievement("goathunter");
  if(picks.filter(p=>p.ovr>=97).length>=3) unlockAchievement("pantheon");
  const decs = new Set(picks.map(p=>p.decade));
  if(decs.size===1) unlockAchievement("erapurist");
  if(decs.size>=6) unlockAchievement("timetraveler");
  const tc={}; picks.forEach(p=>{ tc[p.team]=(tc[p.team]||0)+1; });
  if(Object.values(tc).some(v=>v>=4)) unlockAchievement("franchisecore");
  const r = ratings("regular");
  if(r.off>=92) unlockAchievement("airraid");
  if(r.def>=92) unlockAchievement("ironcurtain");
  if(r.off>=88 && r.def>=88) unlockAchievement("completeteam");
  const n100 = picks.filter(p=>(p.tags||playerTags(p.name,p.pos)).includes("NFL100")).length;
  if(n100>=5) unlockAchievement("starsaligned");
  const nameSet = new Set(picks.map(p=>p.name));
  if(picks.some(p=>{ const pr=duoPartnerOf(p.name,p.pos); return pr && nameSet.has(pr); })) unlockAchievement("dynamicduo");
  if(picks.some(p=>p.crossPos)) unlockAchievement("posswitch");
  if(picks.every(p=>p.ovr>=85)) unlockAchievement("noweaklinks");
  if(state.lifetime.draftsCompleted>=10) unlockAchievement("grinder");
  if(state.lifetime.draftsCompleted>=25) unlockAchievement("veteran");
  if(state.lifetime.draftsCompleted>=50) unlockAchievement("obsessed");
  if(!state.lifetime.modesDrafted) state.lifetime.modesDrafted=[];
  if(!state.lifetime.modesDrafted.includes(state.mode)) state.lifetime.modesDrafted.push(state.mode);
  if(["classic","bk","blackout"].every(m=>state.lifetime.modesDrafted.includes(m))) unlockAchievement("triplethreat");
  if(avg>=90 && state.mode==="bk") unlockAchievement("eyefortalent");
  if(avg>=90 && state.mode==="blackout") unlockAchievement("sixthsense");
}
async function finishDraft(){

/* ============ DRAFT SCORE (0-100): skill 50 + season 25 + playoffs 25 ============ */
const ERA_CEILING = {"1970s":94,"1980s":94,"1990s":94,"2000s":94,"2010s":94,"2020s":94};
const DRAFT_FLOOR = 80;                    // avgOvr at/below this = 0 draft points
function draftSkillCeiling(){ return ERA_CEILING[state.chosenEra] || 94; }
function draftSkill01(){
  const filled = SLOTS.map(s=>state.picks[s.code]).filter(Boolean);
  if(!filled.length) return 0;
  const avg = filled.reduce((a,p)=>a+p.ovr,0)/filled.length;   // raw team overall
  const ceil = draftSkillCeiling();
  return clamp((avg - DRAFT_FLOOR) / (ceil - DRAFT_FLOOR), 0, 1);
}
function playoffProgress(){
  const po = state.playoffs;
  if(!po || !po.made) return {won:0, need:4};
  const need = po.rounds.length;
  let won = po.results ? po.results.filter(x=>x.win).length : 0;
  if(po.champion) won = need;
  return {won, need};
}
function draftScoreParts(){
  const skill = 65 * draftSkill01();
  const s = state.season || {wins:0};
  const season = 20 * clamp(s.wins/17, 0, 1);
  const pp = playoffProgress();
  const playoff = pp.need ? 15 * (pp.won / pp.need) : 0;
  const total = Math.round(clamp(skill + season + playoff, 0, 100));
  return {skill, season, playoff, total};
}
function draftScore(){ return draftScoreParts().total; }
function draftGradeLetter(q){
  return q>=99?"S":q>=88?"A+":q>=80?"A":q>=72?"A-":q>=63?"B+":q>=55?"B":q>=47?"B-":q>=38?"C+":q>=30?"C":q>=22?"C-":q>=14?"D":"F";
}
function gradeLetter(v){
  return v>=97?"S":v>=92?"A+":v>=88?"A":v>=84?"A-":v>=80?"B+":v>=75?"B":v>=70?"B-":v>=65?"C+":v>=58?"C":v>=52?"C-":v>=45?"D":"F";
}
function gradeColor(v){

}

/* ============ SEASON + SIM ENGINE ============ */
function ovrClass(m){ return m>0 ? 'ovrUp' : (m<=-3 ? 'ovrDown' : (m<0 ? 'ovrDip' : '')); }
function normalizePicks(){
  // Re-sync every drafted pick to the LIVE era rules from its stable base OVR.
  // Guarantees a roster never shows stale numbers after any era-logic change,
  // and is a no-op when nothing has changed.
  if(!state.picks) return;
  for(const code in state.picks){
    const pk = state.picks[code];
    if(!pk || pk.ovrBase==null) continue;
    let mod = eraModifier(pk.decade, pk.name, pk.pos);
    pk.eraMod = mod;
    pk.ovr = clamp(pk.ovrBase + mod, 40, 99);
  }
}
function avgOvr(){
  const vals = SLOTS.map(s=> state.picks[s.code].ovr);
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}
function ratings(phase){
  phase = phase||"regular";
  const eo = code => effectiveOvr(state.picks[code], phase);
  const off = (eo("QB")*1.3 + eo("RB") + eo("WR1")*1.05 + eo("WR2")*1.05 + eo("TE")*0.85 + eo("FLEXO")*0.9)/6;
  const def = (eo("DL")*1.05 + eo("DT") + eo("LB")*1.05 + eo("CB")*1.05 + eo("S") + eo("FLEXD")*0.9)/6;
  return {off, def};
}
function teamTagBias(){
  let gb=0, bh=0;
  SLOTS.forEach(s=>{ const p=state.picks[s.code]; if(!p) return; if(GAMEBREAK.has(p.name)) gb++; if(BALLHAWK.has(p.name)) bh++; });
  return { gameBreak: Math.min(0.045, gb*0.02), ballHawk: Math.min(0.045, bh*0.02) };
}

/* ---- realistic scoring: football-legal totals from drives ---- */
function playDrives(off, def, tdBiasExtra){
  const ep = eraProfile();
  const drives = Math.round(rand(9.5,12));
  let tds=0, fgs=0;
  const diff = off - def;
  for(let i=0;i<drives;i++){
    const tdP = clamp(0.185 + diff*0.009 + ep.tdBias + (tdBiasExtra||0), 0.03, 0.55);
    const fgP = clamp(0.14 + diff*0.004 + ep.fgBias, 0.05, 0.28);
    const roll = Math.random();
    if(roll < tdP) tds++;
    else if(roll < tdP+fgP) fgs++;
  }
  return {tds, fgs};
}
function pointsFrom(d){
  let pts = 0;
  for(let i=0;i<d.tds;i++){
    const r = Math.random();
    if(r < 0.05) pts += 8;        // 2-pt conversion
    else if(r < 0.09) pts += 6;   // missed XP
    else pts += 7;                // TD + XP
  }
  pts += d.fgs*3;
  const sfty = Math.random()<0.03; // rare safety
  if(sfty) pts += 2;
  return pts;
}
const FORM_SWING = 14;   // per-game "any given Sunday" form variance (rating pts)
function simGame(myOff, myDef, oppOff, oppDef, opts){
  opts = opts||{};
  const s1 = rand(-FORM_SWING, FORM_SWING), s2 = rand(-FORM_SWING, FORM_SWING);
  let mine = playDrives(myOff + s1, oppDef, opts.gameBreak||0);
  let theirs = playDrives(oppOff + s2, myDef, -(opts.ballHawk||0));
  let myScore = pointsFrom(mine);
  let oppScore = pointsFrom(theirs);
  let guard=0;
  while(myScore===oppScore && guard++<10){   // no ties: sudden-death OT
    const meFav = (myOff+myDef) >= (oppOff+oppDef);
    const scorer = Math.random() < (meFav?0.57:0.43) ? "me":"opp";
    const td = Math.random()<0.55;
    const pts = td?7:3;
    if(scorer==="me"){ myScore+=pts; if(td)mine.tds++; else mine.fgs++; }
    else { oppScore+=pts; if(td)theirs.tds++; else theirs.fgs++; }
  }
  return {myScore, oppScore, win:myScore>oppScore,
          myTDs:mine.tds, myFGs:mine.fgs, oppTDs:theirs.tds, oppFGs:theirs.fgs};
}

/* ---- per-player season stat accrual ---- */
function blankStats(){ return {gp:0,passYds:0,passTD:0,int:0,rushYds:0,rushTD:0,rec:0,recYds:0,recTD:0,tackles:0,sacks:0,defInt:0}; }
function makeBox(){ const b={}; SLOTS.forEach(s=> b[s.code]=blankStats()); return b; }
function initSeasonStats(){ state.statsReg=makeBox(); state.statsPost=makeBox(); state.awards={}; state.statsView="reg"; }
function addBox(box, code, delta){ const t=box[code]; if(!t) return; for(const k in delta) t[k]=(t[k]||0)+delta[k]; }
function mergeInto(target, box){ SLOTS.forEach(s=>{ const src=box[s.code]; for(const k in src) target[s.code][k]=(target[s.code][k]||0)+src[k]; }); }
function combinedStats(){ const b=makeBox(); mergeInto(b, state.statsReg); mergeInto(b, state.statsPost); return b; }
function weightedPick(list){
  const sum=list.reduce((a,x)=>a+x[1],0)||1; let r=Math.random()*sum;
  for(const x of list){ r-=x[1]; if(r<=0) return x[0]; }
  return list[list.length-1][0];
}
function spreadBox(box, list, yards, field){
  const sum=list.reduce((a,x)=>a+x[1],0)||1;
  list.forEach(x=>{ const y=Math.round(yards*(x[1]/sum)); if(y>0) addBox(box, x[0], {[field]:y}); });
}
function assignBox(box, list, n, field){ for(let i=0;i<n;i++) addBox(box, weightedPick(list), {[field]:1}); }
function distributeMyGame(g){
  const P = state.picks;
  const box = makeBox();
  SLOTS.forEach(s=> addBox(box, s.code, {gp:1}));
  const totalYds = clamp(Math.round(g.myScore*8 + rand(120,175)), 170, 500);
  const ps = eraProfile().passShare;
  const passShare = rand(ps[0], ps[1]);
  let passYds = Math.round(totalYds*passShare);
  let rushYds = totalYds - passYds;
  let rushTD = clamp(Math.round(g.myTDs*rand(0.20,0.45)), 0, g.myTDs);
  let passTD = g.myTDs - rushTD;
  const intThrown = Math.random()<0.58?0:(Math.random()<0.78?1:2);
  const qbScramble = Math.round(rushYds*rand(0,0.10));
  addBox(box, "QB", {passYds, passTD, int:intThrown, rushYds:qbScramble});
  rushYds -= qbScramble;
  // rushing
  const rushers = [["RB", P.RB.ovr]];
  if(P.FLEXO && P.FLEXO.pos==="RB") rushers.push(["FLEXO", P.FLEXO.ovr]);
  spreadBox(box, rushers, rushYds, "rushYds");
  assignBox(box, rushers, rushTD, "rushTD");
  // receiving
  const recs = [["WR1",P.WR1.ovr*1.25],["WR2",P.WR2.ovr],["TE",P.TE.ovr*0.75],["RB",P.RB.ovr*0.35]];
  if(P.FLEXO && (P.FLEXO.pos==="WR"||P.FLEXO.pos==="TE")) recs.push(["FLEXO",P.FLEXO.ovr]);
  const rsum=recs.reduce((a,x)=>a+x[1],0)||1;
  recs.forEach(x=>{ const y=Math.round(passYds*(x[1]/rsum)); const c=y>0?Math.max(1,Math.round(y/rand(11,15))):0; if(y>0) addBox(box, x[0], {recYds:y, rec:c}); });
  assignBox(box, recs, passTD, "recTD");
  // defense: sacks
  const sacks = clamp(Math.round(rand(0,4) + (P.DL.ovr-80)*0.03), 0, 7);
  const rushersD = [["DL",P.DL.ovr*1.2],["DT",P.DT.ovr],["LB",P.LB.ovr*0.7]];
  if(P.FLEXD && ["DL","DT","LB"].includes(P.FLEXD.pos)) rushersD.push(["FLEXD",P.FLEXD.ovr]);
  assignBox(box, rushersD, sacks, "sacks");
  // defense: interceptions
  const dInts = Math.random()<0.6?0:(Math.random()<0.75?1:2);
  const coverers = [["CB",P.CB.ovr*1.1],["S",P.S.ovr],["LB",P.LB.ovr*0.5]];
  if(P.FLEXD && ["CB","S","LB"].includes(P.FLEXD.pos)) coverers.push(["FLEXD",P.FLEXD.ovr]);
  assignBox(box, coverers, dInts, "defInt");
  // defense: tackles
  const tk = Math.round(rand(38,46));
  const tacklers=[["LB",8],["S",7],["CB",5],["DT",4],["DL",4],["FLEXD",5]];
  assignBox(box, tacklers, tk, "tackles");
  return box;
}

/* ---- award scoring ---- */
function offScore(code, v){
  if(!v) return 0;
  if(code==="QB") return v.passYds/25 + v.passTD*4 - v.int*2 + v.rushYds/25 + v.rushTD*4;
  return v.rushYds/10 + v.recYds/12 + (v.rushTD+v.recTD)*6 + v.rec*0.3;
}
function defScore(v){ if(!v) return 0; return v.sacks*8 + v.defInt*12 + v.tackles*0.35; }
function slotMeta(code){ const p=state.picks[code]; return p?`${p.name} (${p.team} ${p.decade})`:code; }
function computeSeasonAwards(){
  const st=state.statsReg, wins=state.season.wins, A={};
  // offensive candidates ranked
  const offRanked = SLOTS.filter(s=>s.group==="Offense").map(s=>({code:s.code, sc:offScore(s.code, st[s.code])}))
    .sort((a,b)=>b.sc-a.sc);
  const defRanked = SLOTS.filter(s=>s.group==="Defense").map(s=>({code:s.code, sc:defScore(st[s.code])}))
    .sort((a,b)=>b.sc-a.sc);
  const topOff=offRanked[0], secondOff=offRanked[1];
  // MVP: elite offensive year on a winning team
  if(topOff && topOff.sc>=273 && wins>=11){ A.mvp={code:topOff.code, note:awardLine(topOff.code, st)}; }
  // OPOY: standout offensive year (the best non-MVP, or a great year with no MVP)
  const opoyPick = A.mvp ? (secondOff && secondOff.sc>=238 ? secondOff : null)
                         : (topOff && topOff.sc>=262 ? topOff : null);
  if(opoyPick){ A.opoy={code:opoyPick.code, note:awardLine(opoyPick.code, st)}; }
  // DPOY: a genuinely dominant defender (splash plays), winning-ish team
  const topDef=defRanked[0];
  if(topDef && topDef.sc>=150 && wins>=9){ A.dpoy={code:topDef.code, note:awardLine(topDef.code, st)}; }
  state.awards = Object.assign(state.awards||{}, A);
}
function awardLine(code, st){
  const v=st[code], p=state.picks[code];
  if(!v||!p) return "";
  if(p.pos==="QB") return `${v.passYds.toLocaleString()} yds, ${v.passTD} TD, ${v.int} INT`;
  if(["RB"].includes(p.pos)) return `${v.rushYds.toLocaleString()} rush yds, ${v.rushTD+v.recTD} TD`;
  if(["WR","TE"].includes(p.pos)) return `${v.rec} rec, ${v.recYds.toLocaleString()} yds, ${v.recTD} TD`;
  return `${v.tackles} tkl, ${v.sacks} sacks, ${v.defInt} INT`;
}
function computeSBMVP(box){
  // best single-game performer in the Super Bowl
  let best=null, bestSc=-1;
  SLOTS.forEach(s=>{
    const v=box[s.code];
    const sc = s.group==="Offense" ? (v.passYds/20 + v.passTD*6 + v.rushYds/10 + v.rushTD*6 + v.recYds/10 + v.recTD*6)
                                   : (v.sacks*8 + v.defInt*14 + v.tackles*1.0);
    if(sc>bestSc){ bestSc=sc; best=s.code; }
  });
  const v=box[best];
  const p=state.picks[best];
  let line = p && p.pos==="QB" ? `${v.passYds} yds, ${v.passTD} TD`
           : p && ["RB","WR","TE"].includes(p.pos) ? `${(v.rushYds+v.recYds)} yds, ${v.rushTD+v.recTD} TD, ${v.rec} rec`
           : `${v.tackles} tkl, ${v.sacks} sk, ${v.defInt} INT`;
  state.awards.sbmvp = {code:best, note:line};
}


function startSeason(){
  normalizePicks();
  state.animScore=true;
  const r = ratings("regular");
  if(avgOvr()>=90) unlockAchievement("dynasty");
  const bias = teamTagBias();
  state.season = { off:r.off, def:r.def, week:0, totalWeeks:17, results:[], wins:0, losses:0, complete:false, gameBreak:bias.gameBreak, ballHawk:bias.ballHawk };
  state.playoffs = null;
  initSeasonStats();
  state.screen="season";
  render();
}
function simulateWeek(){
  const s = state.season;
  if(s.week>=s.totalWeeks) return;
  const oppOff = rand(72,92), oppDef = rand(72,92);
  const g = simGame(s.off, s.def, oppOff, oppDef, {gameBreak:s.gameBreak, ballHawk:s.ballHawk});
  mergeInto(state.statsReg, distributeMyGame(g));
  if(g.win) s.wins++; else s.losses++;
  s.results.push({week:s.week+1, myScore:g.myScore, oppScore:g.oppScore, win:g.win});
  s.week++;
  if(g.win && (g.myScore-g.oppScore)>=25) unlockAchievement("blowout");
  if(g.myScore>=40) unlockAchievement("juggernaut");
  if(g.oppScore<10) unlockAchievement("lockdown");
  if(g.win && g.myScore>=45) unlockAchievement("shootout");
  if(s.week>=s.totalWeeks){ s.complete=true; finalizeSeason(); }
  render();
}
function simulateAll(){ const s=state.season; while(s.week<s.totalWeeks) simulateWeek(); }

/* ---- playoffs: personal gauntlet to the Super Bowl ---- */
function buildPlayoffs(seed){
  const NAMES=["Wild Card","Divisional","Conference Championship","Super Bowl"];
  const rounds = seed===1 ? NAMES.slice(1) : NAMES;   // 1-seed gets a bye
  return {made:true, seed, rounds, roundIndex:0, results:[], eliminated:false, champion:false};
}
function seedFor(w){ return w>=16?1 : w>=14?2 : w>=12?3 : w>=11?4 : w>=10?5 : w>=9?6 : 0; }
async function finalizeSeason(){
  const s = state.season;
  state.animScore=true;
  state.lifetime.seasonsPlayed++;
  state.lifetime.totalWins += s.wins;
  state.lifetime.totalLosses += s.losses;
  if(s.losses===0){ unlockAchievement("undefeated"); state.lifetime.undefeatedRuns++; }
  if(s.wins>=12) unlockAchievement("survivor");
  if(s.wins>=16) unlockAchievement("byeweek");
  if(s.results.reduce((a,x)=>a+x.myScore,0)>=500) unlockAchievement("pointmachine");
  if(s.losses===0 && state.mode==="bk") unlockAchievement("blindfaith");
  if(s.losses===0 && state.mode==="blackout") unlockAchievement("perfectdarkness");
  if(state.lifetime.undefeatedRuns>=5) unlockAchievement("flawless");
  if(state.lifetime.totalWins>=100) unlockAchievement("century");
  if(state.lifetime.draftsCompleted>=25) unlockAchievement("veteran");
  if(state.lifetime.draftsCompleted>=50) unlockAchievement("obsessed");
  if(state.lifetime.draftsCompleted>=10) unlockAchievement("grinder");
  const seed = seedFor(s.wins);
  state.playoffs = seed ? buildPlayoffs(seed) : {made:false, seed:0};
  computeSeasonAwards();
  await saveLifetime();
  render();
}
function enterPlayoffs(){ state.screen="playoffs"; render(); }
function simPlayoffGame(){
  const po=state.playoffs, s=state.season;
  if(!po || !po.made || po.eliminated || po.champion) return;
  const r = po.roundIndex;
  const phase = po.rounds[r]==="Super Bowl" ? "superbowl" : "playoff";
  const rr = ratings(phase);
  const globalRound = (po.seed===1?1:0) + r;   // difficulty ramps each round
  const base = 77 + globalRound*2.5;
  const oppOff = clamp(rand(base, base+6), 78, 99);
  const oppDef = clamp(rand(base, base+6), 78, 99);
  const g = simGame(rr.off, rr.def, oppOff, oppDef, {gameBreak:s.gameBreak, ballHawk:s.ballHawk});
  const box = distributeMyGame(g);
  mergeInto(state.statsPost, box);
  po.results.push({round:po.rounds[r], myScore:g.myScore, oppScore:g.oppScore, win:g.win});
  if(g.myScore>=40) unlockAchievement("juggernaut");
  if(g.oppScore<10) unlockAchievement("lockdown");
  if(g.win){
    if(g.myScore-g.oppScore>=25) unlockAchievement("blowout");
    if(g.myScore>=45) unlockAchievement("shootout");
    if(po.rounds[r]==="Super Bowl"){
      po.champion=true; state.celebrate=true; state.animScore=true; computeSBMVP(box); unlockAchievement("champion");
      if(po.seed>=5) unlockAchievement("cinderella");
      if(po.seed>=6) unlockAchievement("gauntlet");
      if(state.awards && state.awards.sbmvp) unlockAchievement("mvpmaker");
      if(state.season && state.season.losses===0) unlockAchievement("immortal");
      if(avgOvr()<85) unlockAchievement("underdog");
      if(state.mode==="bk") unlockAchievement("ballknower");
      if(state.mode==="blackout") unlockAchievement("inthedark");
      state.lifetime.championships=(state.lifetime.championships||0)+1;
      if(state.lifetime.championships>=3) unlockAchievement("champdynasty");
      if(state.lifetime.championships>=5) unlockAchievement("ringcollector");
    }
    else po.roundIndex++;
  } else { po.eliminated=true; state.animScore=true; }
  saveLifetime();
  render();
}
function roundReached(){
  const po=state.playoffs;
  if(!po||!po.made) return "Missed playoffs";
  if(po.champion) return "Super Bowl Champion";
  const played = po.results.length;
  if(played===0) return "Made playoffs (seed "+po.seed+")";
  const last = po.results[po.results.length-1];
  return po.eliminated ? ("Lost in "+last.round) : last.round;
}

async function submitToLeaderboard(name){
  if(state.runSaved || state.saving){ viewLeaderboards(); return; }  // block duplicate saves of the same run
  state.saving = true;
  const s = state.season, po = state.playoffs, aw = state.awards||{};
  const honors = [];
  if(aw.mvp) honors.push("MVP");
  if(aw.dpoy) honors.push("DPOY");
  if(aw.sbmvp && po && po.champion) honors.push("SB MVP");
  try {
    const poWins = (po && po.results) ? po.results.filter(x=>x.win).length : 0;
    const madePO = !!(po && po.made);
    await saveToLeaderboard({
      name: name||"Anonymous Coach", wins:s.wins, losses:s.losses,
      undefeated: s.losses===0, avgOvr: avgOvr(), era: state.chosenEra||"",
      mode: state.mode||"classic",
      score: draftScore(),
      poWins: poWins,
      totalWins: s.wins + poWins,
      totalLosses: s.losses + (madePO && !po.champion ? 1 : 0),
      champion: !!(po && po.champion), roundReached: roundReached(), honors,
      roster: SLOTS.map(sl=> sl.label+": "+state.picks[sl.code].name+" ("+state.picks[sl.code].team+", "+state.picks[sl.code].decade+")"),
      date: new Date().toISOString().slice(0,10)
    });
    state.runSaved = true;
  } finally {
    state.saving = false;
  }
  state.leaderboardCache = await fetchLeaderboard();
  state.lbView = "best"; state.lbMode = state.mode||"classic"; state.prevScreen = state.screen; state.screen = "leaderboards";
  render();
}
function viewLeaderboards(){
  state.lbView = state.lbView||"best"; state.lbMode = state.lbMode||(state.mode||"classic");
  state.prevScreen = state.screen; state.screen = "leaderboards"; render();
}

}

function setStatsView(v){ state.statsView=v; render(); }
function awardsCard(){
  const aw=state.awards||{};
  const items=[];
  if(aw.mvp) items.push(["🏅","League MVP", slotMeta(aw.mvp.code), aw.mvp.note]);
  if(aw.opoy) items.push(["⚡","Offensive Player of the Year", slotMeta(aw.opoy.code), aw.opoy.note]);
  if(aw.dpoy) items.push(["🛡️","Defensive Player of the Year", slotMeta(aw.dpoy.code), aw.dpoy.note]);
  if(aw.sbmvp && state.playoffs && state.playoffs.champion) items.push(["👑","Super Bowl MVP", slotMeta(aw.sbmvp.code), aw.sbmvp.note]);
  if(!items.length) return "";
  const rows = items.map(([ic,title,who,note])=>`
    <div class="awardRow"><span class="awardIc">${ic}</span>
      <div><div class="awardTitle">${title}</div><div class="awardWho">${who}</div><div class="awardNote mono">${note}</div></div></div>`).join('');
  return `<div class="card"><h3 style="margin-bottom:8px;">Season Honors</h3>${rows}</div>`;
}

function renderLeaderboards(){
  const lbMode = state.lbMode || "classic";
  const metric = state.lbMetric || "score";
  const view = state.lbView || "best";
  const list = (state.leaderboardCache||[]).filter(e=>(e.mode||"classic")===lbMode);
  const ranked = lbRank(list, metric, view);
  state.lbRanked = ranked;
  const medal = i => i===0?"🥇":i===1?"🥈":i===2?"🥉":`<span class="mono">${i+1}</span>`;

  const recOf = e => {
    const tw = (e.totalWins!=null?e.totalWins:e.wins);
    const tl = (e.totalLosses!=null?e.totalLosses:e.losses);
    return `${tw}-${tl}`;
  };
  const scoreOf = e => {
    if(e.score==null) return '<span class="small">\u2014</span>';
    return `${e.score}<span class="mono" style="font-size:10px; color:${gradeColor(e.score)};"> ${gradeLetter(e.score)}</span>`;
  };
  const hot = m => metric===m ? ' lbHot' : '';

  const rows = ranked.map((e,i)=>{
    const badge = e.champion?'\ud83d\udc51':(e.undefeated?'\ud83c\udfc6':'');
    const honors = (e.honors&&e.honors.length)?` <span class="mono" style="color:var(--primary); font-size:10px;">${e.honors.join('\u00b7')}</span>`:'';
    const era = e.era?`<div class="cslot">${e.era}${badge?' \u00b7 '+badge+' '+(e.roundReached||''):''}</div>`:(badge?`<div class="cslot">${badge} ${e.roundReached||''}</div>`:'');
    return `<tr style="cursor:pointer;" onclick="viewLbRoster(${i})">
      <td>${medal(i)}</td>
      <td>${e.name}${honors}${era}</td>
      <td class="mono${hot('score')}">${scoreOf(e)}</td>
      <td class="mono${hot('record')}">${recOf(e)}</td>
      <td class="mono${hot('ovr')}">${e.avgOvr}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="5" class="small">No saved runs yet \u2014 finish a season and save it to appear here.</td></tr>`;

  const mtab=(m,label)=>`<button class="segBtn ${lbMode===m?'segOn':''}" onclick="setLbMode('${m}')">${label}</button>`;
  const xtab=(m,label)=>`<button class="segBtn ${metric===m?'segOn':''}" onclick="setLbMetric('${m}')">${label}</button>`;
  const vtab=(v,label)=>`<button class="segBtn ${view===v?'segOn':''}" onclick="setLbView('${v}')">${label}</button>`;

  const metricName = metric==='ovr'?'Team Overall' : metric==='record'?'Record (incl. playoffs)' : 'Draft Score';
  const blurb = (view==="best"?'Best ':'Worst ')+metricName.toLowerCase()+' in '+MODE_LABEL[lbMode]+' mode.';

  return `${Scorebug()}
  <div class="card">
    <h2 style="margin-bottom:6px;">Leaderboards</h2>
    <div class="seg">${mtab("classic","Classic")}${mtab("bk","Ball Knowers")}${mtab("blackout","Blackout")}</div>
    <div class="seg" style="margin-top:8px;">${xtab("score","Draft Score")}${xtab("record","Record")}${xtab("ovr","Overall")}</div>
    <div class="seg" style="margin-top:8px;">${vtab("best","\ud83c\udfc6 Best")}${vtab("worst","\ud83d\udc80 Worst")}</div>
    <p class="small" style="margin-top:8px;">${SUPA_ON()?'\ud83c\udf10 Global':'\ud83d\udcf1 Local'} \u00b7 ${blurb}</p>
  </div>
  <div class="card">
    <table><thead><tr><th></th><th>Coach</th><th class="${hot('score')}">Score</th><th class="${hot('record')}">Rec</th><th class="${hot('ovr')}">OVR</th></tr></thead><tbody>${rows}</tbody></table>
    <p class="small" style="margin-top:8px; text-align:center;">Tap any coach to see the roster they drafted.</p>
  </div>
  <div class="card center"><button class="btn secondary" onclick="backFromLeaderboards()">\u2190 Back</button></div>
  ${LbRosterModal()}
  ${Footer()}`;
}
function viewLbRoster(i){ const e=(state.lbRanked||[])[i]; if(!e) return; state.lbRosterOpen=e; render(); }
function closeLbRoster(){ state.lbRosterOpen=null; render(); }
function LbRosterModal(){

function renderStats(){
  const P = state.picks;
  const view = state.statsView||"reg";
  const hasPost = state.statsPost && state.statsPost.QB && state.statsPost.QB.gp>0;
  const st = view==="post" ? state.statsPost : view==="combined" ? combinedStats() : state.statsReg;
  const nm = code => P[code] ? P[code].name : code;
  const gp = st.QB ? st.QB.gp : 0;
  const passRows = [["QB", st.QB]].filter(x=>x[1] && (x[1].passYds>0))
    .map(([c,v])=>`<tr><td>${nm(c)}</td><td class="mono">${v.passYds.toLocaleString()}</td><td class="mono">${v.passTD}</td><td class="mono">${v.int}</td></tr>`).join('');
  const rushRows = SLOTS.map(s=>[s.code, st[s.code]]).filter(([c,v])=>v && v.rushYds>0)
    .sort((a,b)=>b[1].rushYds-a[1].rushYds)
    .map(([c,v])=>`<tr><td>${nm(c)}</td><td class="mono">${v.rushYds.toLocaleString()}</td><td class="mono">${v.rushTD}</td></tr>`).join('');
  const recRows = SLOTS.map(s=>[s.code, st[s.code]]).filter(([c,v])=>v && v.recYds>0)
    .sort((a,b)=>b[1].recYds-a[1].recYds)
    .map(([c,v])=>`<tr><td>${nm(c)}</td><td class="mono">${v.rec}</td><td class="mono">${v.recYds.toLocaleString()}</td><td class="mono">${v.recTD}</td></tr>`).join('');
  const defRows = SLOTS.filter(s=>s.group==="Defense").map(s=>[s.code, st[s.code]]).filter(([c,v])=>v)
    .sort((a,b)=>(b[1].sacks+b[1].defInt*2+b[1].tackles*0.05)-(a[1].sacks+a[1].defInt*2+a[1].tackles*0.05))
    .map(([c,v])=>`<tr><td>${nm(c)}</td><td class="mono">${v.tackles}</td><td class="mono">${v.sacks}</td><td class="mono">${v.defInt}</td></tr>`).join('');
  const tab = (v,label)=>`<button class="segBtn ${view===v?'segOn':''}" onclick="setStatsView('${v}')">${label}</button>`;
  const toggle = hasPost ? `<div class="seg">${tab("reg","Regular Season")}${tab("post","Playoffs")}${tab("combined","Combined")}</div>` : '';

  return `${Scorebug()}
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2>Player Stats</h2><span class="small mono">${gp} games</span>
    </div>
    ${toggle || '<p class="small">Regular-season production.</p>'}
  </div>
  ${view==="reg" ? awardsCard() : ""}
  <div class="card"><h3 style="margin-bottom:6px;">Passing</h3>
    <table><thead><tr><th>Player</th><th>Yds</th><th>TD</th><th>INT</th></tr></thead><tbody>${passRows||'<tr><td class="small">No data</td></tr>'}</tbody></table></div>
  <div class="card"><h3 style="margin-bottom:6px;">Rushing</h3>
    <table><thead><tr><th>Player</th><th>Yds</th><th>TD</th></tr></thead><tbody>${rushRows||'<tr><td class="small">No data</td></tr>'}</tbody></table></div>
  <div class="card"><h3 style="margin-bottom:6px;">Receiving</h3>
    <table><thead><tr><th>Player</th><th>Rec</th><th>Yds</th><th>TD</th></tr></thead><tbody>${recRows||'<tr><td class="small">No data</td></tr>'}</tbody></table></div>
  <div class="card"><h3 style="margin-bottom:6px;">Defense</h3>
    <table><thead><tr><th>Player</th><th>Tkl</th><th>Sacks</th><th>INT</th></tr></thead><tbody>${defRows||'<tr><td class="small">No data</td></tr>'}</tbody></table></div>
  <div class="card center"><button class="btn secondary" onclick="backFromStats()">← Back</button></div>
  ${Footer()}`;
}

    <h2 style="margin-bottom:10px;">How to Play</h2>

    <p class="small" style="margin-bottom:8px;">3. Tap a player to slot them into your roster: Offense is QB, RB, WR, WR, TE, and a Flex (RB/WR/TE). Defense is DL, DT, LB, CB, S, and a Flex (any defensive position).</p>
    <p class="small" style="margin-bottom:8px;">4. Don't love a spin? You get one free Team respin and one free Decade respin per game — use them whenever you want.</p>

  return `<div class="modalBg" onclick="closeModals(event)"><div class="modalBox">
    <h2 style="margin-bottom:10px;">Leaderboard</h2>

    <button class="btn" style="margin-top:14px;" onclick="closeModals()">Close</button>
  </div></div>`;
}

/* ---------- Achievement toasts (live outside render root so re-renders don't wipe them) ---------- */
let _toastQ = [], _toastActive = 0; const TOAST_MAX = 3;
function queueAchievementToast(id){
  if(typeof document==='undefined' || !document.createElement) return;
  const a = ACHIEVEMENTS.find(x=>x.id===id); if(!a) return;
  _toastQ.push(a); pumpToasts();
}
function pumpToasts(){ while(_toastActive < TOAST_MAX && _toastQ.length){ _toastActive++; showToast(_toastQ.shift()); } }
function showToast(a){
  let wrap = document.getElementById('toastWrap');
  if(!wrap){ wrap=document.createElement('div'); wrap.id='toastWrap'; wrap.className='toastWrap'; document.body.appendChild(wrap); }
  const el=document.createElement('div'); el.className='achToast';
  el.innerHTML = `<span class="achToastIcon">${a.icon}</span><span class="achToastBody"><span class="achToastKick">Achievement Unlocked</span><span class="achToastName">${a.name}</span></span>`;
  wrap.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{ el.classList.remove('show'); el.classList.add('hide'); setTimeout(()=>{ el.remove(); _toastActive--; pumpToasts(); }, 400); }, 2900);
}
/* ---------- Count-up for the draft score ---------- */
function animateScoreCount(){
  const el = document.querySelector('.scoreNum'); if(!el) return;
  const to = parseInt(el.getAttribute('data-to'),10); if(isNaN(to)) return;
  if(to<=0){ el.textContent='0'; return; }
  const dur=900, t0=performance.now(); el.textContent='0';
  (function step(now){ const k=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-k,3); el.textContent=Math.round(to*e); if(k<1) requestAnimationFrame(step); else el.textContent=to; })(performance.now());
}
/* ---------- Championship confetti ---------- */
function fireConfetti(){
  if(typeof document==='undefined' || !document.createElement) return;
  const colors=['#f2c230','#5fd97a','#4fc3f7','#ff6a5f','#ffffff','#39ff14'];
  const layer=document.createElement('div'); layer.className='confettiLayer'; document.body.appendChild(layer);
  for(let i=0;i<100;i++){
    const c=document.createElement('div'); c.className='confetti'; const sz=6+Math.random()*7;
    c.style.left=Math.random()*100+'vw'; c.style.width=c.style.height=sz+'px';
    c.style.background=colors[i%colors.length];
    c.style.animationDelay=(Math.random()*0.5)+'s'; c.style.animationDuration=(2.6+Math.random()*1.8)+'s';
    if(i%4===0) c.style.borderRadius='50%';
    layer.appendChild(c);
  }
  setTimeout(()=>layer.remove(), 5200);
}
/* ---------- Post-render hook ---------- */
function postRender(){
  if(state.animScore){ state.animScore=false; animateScoreCount(); }
  if(state.celebrate){ state.celebrate=false; fireConfetti(); }
}
function render(){
  let html="";
  if(state.screen==="menu") html=renderMenu();
  else if(state.screen==="era") html=renderEra();
  else if(state.screen==="draft") html=renderDraft();
  else if(state.screen==="reveal") html=renderReveal();
  else if(state.screen==="season") html=renderSeason();
  else if(state.screen==="playoffs") html=renderPlayoffs();
  else if(state.screen==="stats") html=renderStats();
  else if(state.screen==="leaderboards") html=renderLeaderboards();
  else if(state.screen==="tags") html=renderTags();
  document.getElementById("app").innerHTML = html + HowToModal() + LeaderboardModal() + LifetimeModal() + AchievementsModal();
  if(state.screen==="draft") hydrateReels();
  postRender();
}
function closeModals(e){ if(e && e.target!==e.currentTarget) return; howToOpen=leaderboardOpen=lifetimeOpen=achievementsOpen=false; render(); }
function openHowTo(){ howToOpen=true; render(); }
async function openLeaderboard(){ state.leaderboardCache = await fetchLeaderboard(); leaderboardOpen=true; render(); }
async function openLeaderboards(){ state.leaderboardCache = await fetchLeaderboard(); state.lbView = state.lbView||"best"; state.prevScreen = state.screen; state.screen = "leaderboards"; render(); }
function setLbView(v){ state.lbView = v; render(); }
function setLbMode(m){ state.lbMode = m; render(); }
function openTags(){ state.prevScreen = state.screen; state.screen = "tags"; render(); }
function backFromTags(){ state.screen = (state.prevScreen && state.prevScreen!=="tags") ? state.prevScreen : "menu"; render(); }
function backFromLeaderboards(){ state.screen = (state.prevScreen && state.prevScreen!=="leaderboards") ? state.prevScreen : "menu"; render(); }
function openLifetime(){ lifetimeOpen=true; render(); }
function openAchievements(){ achievementsOpen=true; render(); }

(async function init(){ await loadLifetime(); render(); })();
</script>
